<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Budget</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .config-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .config-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; }
        .config-field { margin-bottom: 12px; }
        .config-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .config-field input, .config-field textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #111;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .btn-danger { background-color: #e74c3c; }
        .btn:hover { opacity: 0.9; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card-title { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        .text-green { color: var(--accent-green); }
        .text-orange { color: var(--accent-orange); }

        .goal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .goal-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: #111; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-blue); height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .history-card h2 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--text-secondary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; font-size: 14px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; font-size: 12px; }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gain { background-color: rgba(46, 204, 113, 0.2); color: var(--accent-green); }
        .badge-depense { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .loader { text-align: center; color: var(--text-secondary); padding: 20px; display: none; }
        .footer-link { text-align: center; margin-top: 40px; font-size: 13px; color: #666; cursor: pointer; text-decoration: underline; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Application Budget</h1>

    <div id="actionButtons" style="display: none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnRefresh" class="btn" onclick="fetchBudgetData()">🔄 Actualiser via API</button>
    </div>

    <div id="loader" class="loader">Connexion à Home Assistant...</div>

    <!-- Panneau de configuration de l'API -->
    <div id="configPanel" class="config-panel" style="display: none;">
        <h3>🔑 Configuration des accès Home Assistant</h3>
        <div class="config-field">
            <label for="haUrlInput">URL Nabu Casa de base (sans /api/...) :</label>
            <input type="url" id="haUrlInput" placeholder="https://xxxxxxxxxxxxxxxxxxxx.ui.nabu.casa">
        </div>
        <div class="config-field">
            <label for="haTokenInput">Jeton d'accès de longue durée (Long-Lived Access Token) :</label>
            <textarea id="haTokenInput" rows="4" placeholder="Collez votre très long jeton ici..."></textarea>
        </div>
        <button class="btn" onclick="saveConfig()">Enregistrer les accès</button>
        <button class="btn btn-danger" onclick="toggleConfig(false)">Annuler</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display: none;">
        <div class="kpi-grid">
            <div class="card">
                <div class="card-title">Solde</div>
                <div id="valSolde" class="card-value text-green">0 €</div>
            </div>
            <div class="card">
                <div class="card-title">Tirelire</div>
                <div id="valTirelire" class="card-value text-orange">0 €</div>
            </div>
        </div>

        <div class="goal-card">
            <div class="goal-header">
                <span id="lblObjectif" style="font-weight: bold;">Mon Objectif</span>
                <span id="valObjectifProgression">0 / 0 €</span>
            </div>
            <div class="progress-bar-bg">
                <div id="barObjectif" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="history-card">
            <h2>Historique des mouvements</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th style="text-align: right;">Montant</th>
                    </tr>
                </thead>
                <tbody id="tableHistory"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-link" onclick="toggleConfig(true)">⚙️ Configuration Réseau</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const savedUrl = localStorage.getItem("ha_api_url");
        const savedToken = localStorage.getItem("ha_api_token");

        if (savedUrl && savedToken) {
            document.getElementById("haUrlInput").value = savedUrl;
            document.getElementById("haTokenInput").value = savedToken;
            document.getElementById("actionButtons").style.display = "flex";
            fetchBudgetData();
        } else {
            toggleConfig(true);
        }
    });

    function toggleConfig(show) {
        document.getElementById("configPanel").style.display = show ? "block" : "none";
    }

    function saveConfig() {
        let url = document.getElementById("haUrlInput").value.trim();
        let token = document.getElementById("haTokenInput").value.trim();

        if (url.endsWith('/')) url = url.slice(0, -1);

        if (!url || !token) {
            alert("Veuillez remplir l'URL et le Jeton d'accès.");
            return;
        }

        localStorage.setItem("ha_api_url", url);
        localStorage.setItem("ha_api_token", token);
        toggleConfig(false);
        document.getElementById("actionButtons").style.display = "flex";
        fetchBudgetData();
    }

    async function fetchBudgetData() {
        const baseUrl = localStorage.getItem("ha_api_url");
        const token = localStorage.getItem("ha_api_token");
        const loader = document.getElementById("loader");
        const dashboard = document.getElementById("dashboard");

        if (!baseUrl || !token) {
            toggleConfig(true);
            return;
        }

        loader.style.display = "block";
        dashboard.style.display = "none";

        // Utilisation d'une méthode GET propre sur l'état spécifique de l'entité
        const apiUrl = `${baseUrl}/api/states/todo.application_budget`;

        try {
            const response = await fetch(apiUrl, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) throw new Error(`Erreur HTTP : ${response.status}`);

            const entityData = await response.json();
            
            // Exploration des attributs standards renvoyés par l'état brut
            let rawJsonText = "";
            if (entityData.attributes) {
                // Tente de trouver la chaîne de caractères JSON là où elle est stockée
                rawJsonText = entityData.attributes.description || 
                              entityData.attributes.summary || 
                              entityData.attributes.text || 
                              "";
            }

            // Si les attributs directs de l'état ne contiennent pas le texte, on tente un fallback sur le message d'état
            if (!rawJsonText && entityData.state && entityData.state !== "unknown") {
                rawJsonText = entityData.state;
            }

            if (!rawJsonText || rawJsonText.trim() === "" || rawJsonText.trim() === "0" || rawJsonText.trim() === "1") {
                throw new Error("Le contenu textuel JSON n'a pas pu être extrait des attributs d'état de la liste de tâches.");
            }

            const budgetData = JSON.parse(rawJsonText.trim());
            renderDashboard(budgetData);

        } catch (error) {
            alert("Erreur lors du traitement des données :\n" + error.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function renderDashboard(data) {
        document.getElementById("dashboard").style.display = "block";
        
        document.getElementById("valSolde").innerText = `${data.solde ?? data.solde_restant ?? '0'} €`;
        document.getElementById("valTirelire").innerText = `${data.tirelire ?? '0'} €`;
        document.getElementById("lblObjectif").innerText = data.nom_objectif || "Objectif";
        
        const cible = data.cible_objective || data.cible_objectif || 1;
        const actuel = data.objectif_courant ?? 0;
        document.getElementById("valObjectifProgression").innerText = `${actuel} / ${cible} €`;
        
        const pourcentage = Math.min(100, Math.round((actuel / cible) * 100));
        document.getElementById("barObjectif").style.width = `${pourcentage}%`;

        const tbody = document.getElementById("tableHistory");
        tbody.innerHTML = "";

        if (data.historique && Array.isArray(data.historique)) {
            const sortedHistory = [...data.historique].reverse();
            sortedHistory.forEach(item => {
                const tr = document.createElement("tr");
                const badgeClass = item.type === "gain" ? "badge-gain" : "badge-depense";
                const labelType = item.type === "gain" ? "Gain" : "Dépense";
                const sign = item.type === "gain" ? "+" : "-";
                const amountClass = item.type === "gain" ? "text-green" : "";

                tr.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td><span class="badge ${badgeClass}">${labelType}</span></td>
                    <td>${item.desc || item.description || ''}</td>
                    <td style="text-align: right; font-weight: bold;" class="${amountClass}">${sign}${item.montant} €</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    function formatDate(dateStr) {
        if(!dateStr) return "-";
        const parts = dateStr.split('-');
        if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
        return dateStr;
    }
</script>
</body>
</html>
