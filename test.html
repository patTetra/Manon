<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Budget - Dashboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .config-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .config-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; }
        .config-field { margin-bottom: 10px; }
        .config-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .config-field input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #111;
            color: white;
            box-sizing: border-box;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-danger { background-color: #e74c3c; }
        .btn:hover { opacity: 0.9; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card-title { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        .text-green { color: var(--accent-green); }
        .text-orange { color: var(--accent-orange); }

        .goal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .goal-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: #111; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-blue); height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .history-card h2 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--text-secondary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; font-size: 14px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; font-size: 12px; }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gain { background-color: rgba(46, 204, 113, 0.2); color: var(--accent-green); }
        .badge-depense { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .loader { text-align: center; color: var(--text-secondary); padding: 20px; display: none; }
        .footer-link { text-align: center; margin-top: 40px; font-size: 13px; color: #666; cursor: pointer; text-decoration: underline; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Application Budget</h1>

    <div id="actionButtons" style="display: none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnRefresh" class="btn" onclick="fetchBudgetGrid()">🔄 Actualiser les données</button>
    </div>

    <div id="loader" class="loader">Connexion à Home Assistant...</div>

    <!-- Panneau de configuration -->
    <div id="configPanel" class="config-panel" style="display: none;">
        <h3>🔑 Configuration des accès Home Assistant</h3>
        <div class="config-field">
            <label for="haUrlInput">URL Nabu Casa de base :</label>
            <input type="url" id="haUrlInput" placeholder="https://xxxxxxxxxxxxxxx.ui.nabu.casa">
        </div>
        <div class="config-field">
            <label for="haTokenInput">Jeton d'accès (Token) :</label>
            <input type="password" id="haTokenInput" placeholder="Collez votre token ici...">
        </div>
        <button class="btn" onclick="saveConfig()">Enregistrer les accès</button>
        <button class="btn btn-danger" onclick="toggleConfig(false)">Annuler</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display: none;">
        <div class="kpi-grid">
            <div class="card">
                <div class="card-title">Solde</div>
                <div id="valSolde" class="card-value text-green">0 €</div>
            </div>
            <div class="card">
                <div class="card-title">Tirelire</div>
                <div id="valTirelire" class="card-value text-orange">0 €</div>
            </div>
        </div>

        <div class="goal-card">
            <div class="goal-header">
                <span id="lblObjectif" style="font-weight: bold;">Mon Objectif</span>
                <span id="valObjectifProgression">0 / 0 €</span>
            </div>
            <div class="progress-bar-bg">
                <div id="barObjectif" class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="history-card">
            <h2>Historique des mouvements</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th style="text-align: right;">Montant</th>
                    </tr>
                </thead>
                <tbody id="tableHistory"></tbody>
            </table>
        </div>
    </div>

    <div class="footer-link" onclick="toggleConfig(true)">⚙️ Configuration Réseau</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const savedUrl = localStorage.getItem("budget_ha_url");
        const savedToken = localStorage.getItem("budget_ha_token");

        if (savedUrl && savedToken) {
            document.getElementById("haUrlInput").value = savedUrl;
            document.getElementById("haTokenInput").value = savedToken;
            document.getElementById("actionButtons").style.display = "flex";
            fetchBudgetGrid();
        } else {
            toggleConfig(true);
        }
    });

    function toggleConfig(show) {
        document.getElementById("configPanel").style.display = show ? "block" : "none";
    }

    function saveConfig() {
        let url = document.getElementById("haUrlInput").value.trim();
        const token = document.getElementById("haTokenInput").value.trim();

        if (!url || !token) {
            alert("Veuillez remplir les deux cases.");
            return;
        }

        if (url.includes("/api")) {
            url = url.split("/api")[0];
        }
        if (url.endsWith("/")) {
            url = url.slice(0, -1);
        }

        localStorage.setItem("budget_ha_url", url);
        localStorage.setItem("budget_ha_token", token);
        
        toggleConfig(false);
        document.getElementById("actionButtons").style.display = "flex";
        fetchBudgetGrid();
    }

    async function fetchBudgetGrid() {
        const baseUrl = localStorage.getItem("budget_ha_url");
        const token = localStorage.getItem("budget_ha_token");
        const loader = document.getElementById("loader");
        const dashboard = document.getElementById("dashboard");

        loader.style.display = "block";
        dashboard.style.display = "none";

        const finalUrl = `${baseUrl}/api/template`;
        const jinjaTemplate = `{% set desc = state_attr('todo.application_budget', 'description') %}{% if desc and 'solde' in desc %}{{ desc }}{% else %}{% set items = state_attr('todo.application_budget', 'todo_items') %}{% if items %}{% for item in items %}{% if 'solde' in item.description %}{{ item.description }}{% endif %}{% endfor %}{% endif %}{% endif %}`;

        try {
            const response = await fetch(finalUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ template: jinjaTemplate })
            });

            if (!response.ok) throw new Error(`Code HTTP ${response.status}`);

            const rawText = await response.text();
            const cleanText = rawText.trim();

            if (!cleanText || cleanText === "None") {
                const debugResponse = await fetch(`${baseUrl}/api/states/todo.application_budget`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const debugJson = await debugResponse.json();
                alert("Structure de l'entité reçue :\n\n" + JSON.stringify(debugJson, null, 2));
                return;
            }

            const budgetData = JSON.parse(cleanText);
            renderDashboard(budgetData);

        } catch (error) {
            alert("Erreur : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function renderDashboard(data) {
        document.getElementById("dashboard").style.display = "block";
        document.getElementById("valSolde").innerText = `${data.solde} €`;
        document.getElementById("valTirelire").innerText = `${data.tirelire} €`;
        document.getElementById("lblObjectif").innerText = data.nom_objectif || "Objectif";
        document.getElementById("valObjectifProgression").innerText = `${data.objectif_courant} / ${data.cible_objective || data.cible_objectif} €`;
        
        const cible = data.cible_objective || data.cible_objectif || 1;
        const pourcentage = Math.min(100, Math.round((data.objectif_courant / cible) * 100));
        document.getElementById("barObjectif").style.width = `${pourcentage}%`;

        const tbody = document.getElementById("tableHistory");
        tbody.innerHTML = "";

        if (data.historique && Array.isArray(data.historique)) {
            const sortedHistory = [...data.historique].reverse();
            sortedHistory.forEach(item => {
                const tr = document.createElement("tr");
                const badgeClass = item.type === "gain" ? "badge-gain" : "badge-depense";
                const labelType = item.type === "gain" ? "Gain" : "Dépense";
                const sign = item.type === "gain" ? "+" : "-";
                const amountClass = item.type === "gain" ? "text-green" : "";

                tr.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td><span class="badge ${badgeClass}">${labelType}</span></td>
                    <td>${item.desc}</td>
                    <td style="text-align: right; font-weight: bold;" class="${amountClass}">${sign}${item.montant} €</td>
                `;
                tbody.appendChild(tr);
            });
        }
    }

    function formatDate(dateStr) {
        if(!dateStr) return "-";
        const parts = dateStr.split('-');
        if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
        return dateStr;
    }
</script>
</body>
</html>
