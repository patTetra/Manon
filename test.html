<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Budget - Dashboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .config-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .config-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; }
        .config-field { margin-bottom: 10px; }
        .config-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .config-field input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #111;
            color: white;
            box-sizing: border-box;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-danger { background-color: #e74c3c; }
        .btn:hover { opacity: 0.9; }

        .loader { text-align: center; color: var(--text-secondary); padding: 20px; display: none; }
        
        /* Bouton discret en bas de page */
        .footer-link {
            text-align: center;
            margin-top: 40px;
            font-size: 11px;
            color: #444;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Application Budget</h1>

    <div id="actionButtons" style="display: none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnRefresh" class="btn" onclick="fetchBudgetGrid()">🔄 Actualiser les données</button>
    </div>

    <div id="loader" class="loader">Connexion à Home Assistant...</div>

    <div id="configPanel" class="config-panel" style="display: none;">
        <h3>🔑 Configuration des accès Home Assistant</h3>
        <div class="config-field">
            <label for="nabuUrl">URL Nabu Casa :</label>
            <input type="url" id="nabuUrl" placeholder="https://xxxxxxxxxxxxxxx.ui.nabu.casa">
        </div>
        <div class="config-field">
            <label for="haToken">Jeton d'accès (Token) :</label>
            <input type="password" id="haToken" placeholder="Collez votre token ici...">
        </div>
        <button class="btn" onclick="saveConfig()">Enregistrer les accès</button>
        <button class="btn btn-danger" onclick="toggleConfig(false)">Annuler</button>
    </div>

    <div id="dashboard" style="display: none;">
        </div>

    <div class="footer-link" onclick="toggleConfig(true)">⚙️ Configuration Réseau</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const savedUrl = localStorage.getItem("budget_ha_url");
        const savedToken = localStorage.getItem("budget_ha_token");

        // Si l'iPhone possède déjà les clés en mémoire, on lance la récupération
        if (savedUrl && savedToken) {
            document.getElementById("actionButtons").style.display = "flex";
            fetchBudgetGrid();
        } else {
            // Sinon, on affiche le panneau pour la première saisie
            toggleConfig(true);
        }
    });

    function toggleConfig(show) {
        document.getElementById("configPanel").style.display = show ? "block" : "none";
    }

    function saveConfig() {
        let url = document.getElementById("nabuUrl").value.trim();
        const token = document.getElementById("haToken").value.trim();

        if (!url || !token) {
            alert("Veuillez remplir les deux cases.");
            return;
        }

        // Nettoyage de l'URL
        if (url.endsWith("/")) url = url.slice(0, -1);
        if (url.includes("/api")) url = url.split("/api")[0];

        // Sauvegarde définitive dans la mémoire locale de Safari de l'iPhone
        localStorage.setItem("budget_ha_url", url);
        localStorage.setItem("budget_ha_token", token);
        
        toggleConfig(false);
        document.getElementById("actionButtons").style.display = "flex";
        fetchBudgetGrid();
    }

    async function fetchBudgetGrid() {
        const baseUrl = localStorage.getItem("budget_ha_url");
        const token = localStorage.getItem("budget_ha_token");
        const loader = document.getElementById("loader");

        loader.style.display = "block";

        const finalUrl = `${baseUrl}/api/template`;
        // Template de diagnostic pour lire le contenu exact de la liste de tâches
        const diagTemplate = `ST_STATE: {{ states('todo.application_budget') }} | ST_ATTRS: {{ states.todo.application_budget.attributes | to_json }}`;

        try {
            const response = await fetch(finalUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    template: diagTemplate
                })
            });

            if (!response.ok) throw new Error(`Code HTTP ${response.status}`);

            const rawText = await response.text();
            
            // Cette alerte va nous afficher précisément comment est structuré votre JSON
            alert("Diagnostic Données HA :\n\n" + rawText);

        } catch (error) {
            alert("Erreur de récupération : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
