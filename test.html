<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Budget - Dashboard</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .config-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        .config-panel h3 { margin-top: 0; margin-bottom: 10px; font-size: 16px; }
        .config-field { margin-bottom: 10px; }
        .config-field label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .config-field input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #111;
            color: white;
            box-sizing: border-box;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-danger { background-color: #e74c3c; }
        .btn:hover { opacity: 0.9; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card-title { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        .text-green { color: var(--accent-green); }
        .text-orange { color: var(--accent-orange); }

        .goal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .goal-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: #111; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-blue); height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .history-card h2 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--text-secondary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; font-size: 14px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; font-size: 12px; }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gain { background-color: rgba(46, 204, 113, 0.2); color: var(--accent-green); }
        .badge-depense { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .loader { text-align: center; color: var(--text-secondary); padding: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Application Budget</h1>

    <div id="configPanel" class="config-panel" style="display: none;">
        <h3>🔑 Configuration de l'accès</h3>
        <p style="font-size: 12px; color: var(--text-secondary);">Entrez vos accès une fois, ou utilisez un lien incluant vos paramètres pour une configuration automatique.</p>
        <div class="config-field">
            <label for="nabuUrl">URL Nabu Casa de base :</label>
            <input type="url" id="nabuUrl" placeholder="https://xxxxxxxxxxxxxxx.ui.nabu.casa">
        </div>
        <div class="config-field">
            <label for="haToken">Jeton d'accès de longue durée (Token HA) :</label>
            <input type="password" id="haToken" placeholder="Votre token secret...">
        </div>
        <button class="btn" onclick="saveConfig()">Enregistrer & Charger</button>
    </div>

    <div id="actionButtons" style="display: none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnRefresh" class="btn" onclick="fetchBudgetGrid()">🔄 Actualiser</button>
        <button class="btn btn-danger" style="width: 150px;" onclick="logout()">🔑 Reset</button>
    </div>

    <div id="loader" class="loader">Connexion à Home Assistant...</div>

    <div id="dashboard" style="display: none;">
        </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // 1. Interception automatique des paramètres de l'URL si présents (?url=...&token=...)
        const urlParams = new URLSearchParams(window.location.search);
        let paramUrl = urlParams.get('url');
        let paramToken = urlParams.get('token');

        if (paramUrl && paramToken) {
            paramUrl = paramUrl.trim();
            if (paramUrl.endsWith("/")) paramUrl = paramUrl.slice(0, -1);
            if (paramUrl.includes("/api")) paramUrl = paramUrl.split("/api")[0];

            localStorage.setItem("budget_ha_url", paramUrl);
            localStorage.setItem("budget_ha_token", paramToken.trim());

            // Nettoyage immédiat de la barre d'adresse du navigateur pour des raisons de sécurité
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({}, document.title, cleanUrl);
        }

        // 2. Vérification des données stockées en mémoire locale
        const savedUrl = localStorage.getItem("budget_ha_url");
        const savedToken = localStorage.getItem("budget_ha_token");

        if (savedUrl && savedToken) {
            document.getElementById("configPanel").style.display = "none";
            document.getElementById("actionButtons").style.display = "flex";
            fetchBudgetGrid();
        } else {
            document.getElementById("configPanel").style.display = "block";
        }
    });

    function saveConfig() {
        let url = document.getElementById("nabuUrl").value.trim();
        const token = document.getElementById("haToken").value.trim();

        if (!url || !token) {
            alert("Veuillez remplir tous les champs.");
            return;
        }

        if (url.endsWith("/")) url = url.slice(0, -1);
        if (url.includes("/api")) url = url.split("/api")[0];

        localStorage.setItem("budget_ha_url", url);
        localStorage.setItem("budget_ha_token", token);
        
        document.getElementById("configPanel").style.display = "none";
        document.getElementById("actionButtons").style.display = "flex";
        fetchBudgetGrid();
    }

    function logout() {
        localStorage.clear();
        document.getElementById("configPanel").style.display = "block";
        document.getElementById("actionButtons").style.display = "none";
        document.getElementById("dashboard").style.display = "none";
    }

    async function fetchBudgetGrid() {
        const baseUrl = localStorage.getItem("budget_ha_url");
        const token = localStorage.getItem("budget_ha_token");
        const loader = document.getElementById("loader");

        loader.style.display = "block";

        const finalUrl = `${baseUrl}/api/template`;
        const diagTemplate = `ST_STATE: {{ states('todo.application_budget') }} | ST_ATTRS: {{ states.todo.application_budget.attributes | to_json }}`;

        try {
            const response = await fetch(finalUrl, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    template: diagTemplate
                })
            });

            if (!response.ok) throw new Error(`Code HTTP ${response.status}`);

            const rawText = await response.text();
            
            // Pop-up temporaire affichant la structure exacte renvoyée par HA
            alert("Diagnostic Données HA :\n\n" + rawText);

        } catch (error) {
            alert("Erreur : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }
</script>
</body>
</html>
