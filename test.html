<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Budget</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #ffffff;
            --text-secondary: #aaaaaa;
            --accent-blue: #3498db;
            --accent-green: #2ecc71;
            --accent-orange: #e67e22;
            --border-color: #404040;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 25px;
            color: var(--text-color);
        }

        .config-panel, .transaction-panel {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
        }
        h3 { margin-top: 0; margin-bottom: 15px; font-size: 16px; color: var(--text-color); }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: #111;
            color: white;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 14px;
        }
        
        .btn {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .btn-success { background-color: var(--accent-green); }
        .btn-danger { background-color: #e74c3c; }
        .btn:hover { opacity: 0.9; }

        .kpi-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .card-title { font-size: 13px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 5px; }
        .card-value { font-size: 24px; font-weight: bold; }
        .text-green { color: var(--accent-green); }
        .text-orange { color: var(--accent-orange); }

        .goal-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
            margin-bottom: 20px;
        }
        .goal-header { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 8px; }
        .progress-bar-bg { background-color: #111; border-radius: 10px; height: 12px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background-color: var(--accent-blue); height: 100%; width: 0%; transition: width 0.5s ease; }

        .history-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid var(--border-color);
        }
        .history-card h2 { font-size: 16px; margin-top: 0; margin-bottom: 15px; color: var(--text-secondary); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; font-size: 14px; border-bottom: 1px solid var(--border-color); }
        th { color: var(--text-secondary); font-weight: normal; font-size: 12px; }
        
        .badge { padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .badge-gain { background-color: rgba(46, 204, 113, 0.2); color: var(--accent-green); }
        .badge-depense { background-color: rgba(231, 76, 60, 0.2); color: #e74c3c; }

        .loader { text-align: center; color: var(--text-secondary); padding: 20px; display: none; }
        .footer-link { text-align: center; margin-top: 40px; font-size: 13px; color: #666; cursor: pointer; text-decoration: underline; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 Application Budget</h1>

    <div id="actionButtons" style="display: none; display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="btnRefresh" class="btn" onclick="fetchAllEntities()">🔄 Actualiser les données</button>
    </div>

    <div id="loader" class="loader">Synchro Home Assistant...</div>

    <!-- Panneau de configuration Réseau -->
    <div id="configPanel" class="config-panel" style="display: none;">
        <h3>🔑 Configuration Connexion</h3>
        <div class="form-group">
            <label for="haUrlInput">URL de votre instance :</label>
            <input type="url" id="haUrlInput" placeholder="https://xxxxxxxx.ui.nabu.casa">
        </div>
        <div class="form-group">
            <label for="haTokenInput">Jeton d'accès de longue durée :</label>
            <input type="password" id="haTokenInput" placeholder="eyJhbGciOiJIUzI1Ni...">
        </div>
        <button class="btn" onclick="saveConfig()">Enregistrer</button>
        <button class="btn btn-danger" onclick="toggleConfig(false)">Annuler</button>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="kpi-grid">
            <div class="card">
                <div class="card-title">Solde</div>
                <div id="valSolde" class="card-value text-green">-- €</div>
            </div>
            <div class="card">
                <div class="card-title">Tirelire</div>
                <div id="valTirelire" class="card-value text-orange">-- €</div>
            </div>
        </div>

        <div class="goal-card">
            <div class="goal-header">
                <span id="lblObjectif" style="font-weight: bold;">--</span>
                <span id="valObjectifProgression">-- / -- €</span>
            </div>
            <div class="progress-bar-bg">
                <div id="barObjectif" class="progress-bar-fill"></div>
            </div>
        </div>

        <!-- FORMULAIRE D'ÉCRITURE -->
        <div class="transaction-panel">
            <h3>📝 Ajouter une opération</h3>
            <div class="form-group">
                <label for="txType">Type d'opération :</label>
                <select id="txType">
                    <option value="gain">➕ Gain (Ajouter au Solde)</option>
                    <option value="depense">➖ Dépense (Retirer du Solde)</option>
                    <option value="tirelire">🐷 Épargne (Transférer du Solde vers Tirelire)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="txDescription">Description :</label>
                <input type="text" id="txDescription" placeholder="Ex: Course, Salaire, Argent de poche...">
            </div>
            <div class="form-group">
                <label for="txMontant">Montant (€) :</label>
                <input type="number" id="txMontant" step="any" placeholder="0.00">
            </div>
            <button class="btn btn-success" onclick="submitTransaction()">Enregistrer le mouvement</button>
        </div>

        <!-- HISTORIQUE -->
        <div class="history-card">
            <h2>Historique des mouvements</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th style="text-align: right;">Montant</th>
                    </tr>
                </thead>
                <tbody id="tableHistory">
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-secondary);">Aucun mouvement enregistré.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="footer-link" onclick="toggleConfig(true)">⚙️ Configuration Réseau</div>
</div>

<script>
    // Variables globales pour stocker l'état local chiffré
    let currentSolde = 0;
    let currentTirelire = 0;
    let currentObjectifActuel = 0;
    let currentObjectifCible = 0;
    let currentHistory = [];

    document.addEventListener("DOMContentLoaded", () => {
        const savedUrl = localStorage.getItem("ha_url");
        const savedToken = localStorage.getItem("ha_token");
        
        if (savedUrl && savedToken) {
            document.getElementById("haUrlInput").value = savedUrl;
            document.getElementById("haTokenInput").value = savedToken;
            document.getElementById("actionButtons").style.display = "flex";
            fetchAllEntities();
        } else {
            toggleConfig(true);
        }
    });

    function toggleConfig(show) {
        document.getElementById("configPanel").style.display = show ? "block" : "none";
    }

    function saveConfig() {
        let url = document.getElementById("haUrlInput").value.trim();
        const token = document.getElementById("haTokenInput").value.trim();
        if (!url || !token) return alert("Champs requis.");
        if(url.endsWith('/')) url = url.slice(0, -1);
        
        localStorage.setItem("ha_url", url);
        localStorage.setItem("ha_token", token);
        toggleConfig(false);
        document.getElementById("actionButtons").style.display = "flex";
        fetchAllEntities();
    }

    // Récupération des états HA individuels (GET /api/states/<entity_id>)
    async function fetchEntityState(entityId) {
        const url = localStorage.getItem("ha_url");
        const token = localStorage.getItem("ha_token");
        const response = await fetch(`${url}/api/states/${entityId}`, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
        });
        if (!response.ok) return null;
        return await response.json();
    }

    // Envoi de données vers HA (POST /api/services/<domain>/<service>)
    async function callHAService(domain, service, data) {
        const url = localStorage.getItem("ha_url");
        const token = localStorage.getItem("ha_token");
        const response = await fetch(`${url}/api/services/${domain}/${service}`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        return response.ok;
    }

    async function fetchAllEntities() {
        const loader = document.getElementById("loader");
        loader.style.display = "block";

        try {
            const [soldeData, tirelireData, objActuelData, objCibleData, nomObjData, historyData] = await Promise.all([
                fetchEntityState('input_number.solde_courant'),
                fetchEntityState('input_number.solde_tirelire'),
                fetchEntityState('input_number.objectif_montant_actuel'),
                fetchEntityState('input_number.objectif_montant_cible'),
                fetchEntityState('input_text.nom_objective') || fetchEntityState('input_text.nom_objectif'),
                fetchEntityState('input_text.budget_historique') // Entité bonus optionnelle pour sauvegarder l'historique
            ]);

            currentSolde = soldeData ? parseFloat(soldeData.state) : 0;
            currentTirelire = tirelireData ? parseFloat(tirelireData.state) : 0;
            currentObjectifActuel = objActuelData ? parseFloat(objActuelData.state) : 0;
            currentObjectifCible = objCibleData ? parseFloat(objCibleData.state) : 0;
            const nomObjectif = nomObjData ? nomObjData.state : "Objectif Épargne";

            if (historyData && historyData.state && historyData.state !== 'unknown') {
                try { currentHistory = JSON.parse(historyData.state); } catch(e) { currentHistory = []; }
            }

            // Mise à jour UI
            document.getElementById("valSolde").innerText = `${currentSolde.toFixed(2)} €`;
            document.getElementById("valTirelire").innerText = `${currentTirelire.toFixed(2)} €`;
            document.getElementById("lblObjectif").innerText = nomObjectif;
            document.getElementById("valObjectifProgression").innerText = `${currentObjectifActuel.toFixed(2)} / ${currentObjectifCible.toFixed(2)} €`;
            
            const pourcentage = currentObjectifCible > 0 ? Math.min(100, Math.round((currentObjectifActuel / currentObjectifCible) * 100)) : 0;
            document.getElementById("barObjectif").style.width = `${pourcentage}%`;

            renderHistory();
        } catch (error) {
            alert("Erreur de synchronisation : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }

    // Gestion de la soumission du formulaire d'écriture
    async function submitTransaction() {
        const type = document.getElementById("txType").value;
        const desc = document.getElementById("txDescription").value.trim();
        const montant = parseFloat(document.getElementById("txMontant").value);

        if (!desc || isNaN(montant) || montant <= 0) {
            alert("Veuillez remplir une description valide et un montant supérieur à 0.");
            return;
        }

        const loader = document.getElementById("loader");
        loader.style.display = "block";

        let newSolde = currentSolde;
        let newTirelire = currentTirelire;
        let newObjActuel = currentObjectifActuel;

        // Calcul des mutations
        if (type === 'gain') {
            newSolde += montant;
        } else if (type === 'depense') {
            newSolde -= montant;
        } else if (type === 'tirelire') {
            if (montant > currentSolde) {
                alert("Erreur : Solde insuffisant pour alimenter la tirelire.");
                loader.style.display = "none";
                return;
            }
            newSolde -= montant;
            newTirelire += montant;
            newObjActuel += montant; // L'argent mis en tirelire fait progresser l'objectif
        }

        try {
            // 1. Envoi des mises à jour des états numériques vers HA via les services officiels
            const promises = [
                callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: newSolde }),
                callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_tirelire', value: newTirelire }),
                callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_actuel', value: newObjActuel })
            ];

            // 2. Gestion et empilement de l'historique
            const today = new Date().toISOString().split('T')[0];
            const newLog = { date: today, type: type === 'tirelire' ? 'depense' : type, desc: type === 'tirelire' ? `🐷 Vers Tirelire : ${desc}` : desc, montant: montant };
            currentHistory.push(newLog);
            if(currentHistory.length > 10) currentHistory.shift(); // Garde les 10 derniers mouvements maximum pour respecter la limite de caractères input_text (255 car.)

            promises.push(
                callHAService('input_text', 'set_value', { entity_id: 'input_text.budget_historique', value: JSON.stringify(currentHistory) })
            );

            await Promise.all(promises);

            // Reset formulaire et rafraîchissement complet
            document.getElementById("txDescription").value = "";
            document.getElementById("txMontant").value = "";
            await fetchAllEntities();

        } catch (error) {
            alert("Erreur lors de l'enregistrement : " + error.message);
        } finally {
            loader.style.display = "none";
        }
    }

    function renderHistory() {
        const tbody = document.getElementById("tableHistory");
        tbody.innerHTML = "";

        if (currentHistory.length > 0) {
            const sorted = [...currentHistory].reverse();
            sorted.forEach(item => {
                const tr = document.createElement("tr");
                const badgeClass = item.type === "gain" ? "badge-gain" : "badge-depense";
                const labelType = item.type === "gain" ? "Gain" : "Dépense";
                const sign = item.type === "gain" ? "+" : "-";
                const amountClass = item.type === "gain" ? "text-green" : "";

                tr.innerHTML = `
                    <td>${formatDate(item.date)}</td>
                    <td><span class="badge ${badgeClass}">${labelType}</span></td>
                    <td>${item.desc || ''}</td>
                    <td style="text-align: right; font-weight: bold;" class="${amountClass}">${sign}${item.montant} €</td>
                `;
                tbody.appendChild(tr);
            });
        } else {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align: center; color: var(--text-secondary);">Aucun mouvement enregistré.</td></tr>`;
        }
    }

    function formatDate(dateStr) {
        if(!dateStr) return "-";
        const parts = dateStr.split('-');
        if(parts.length === 3) return `${parts[2]}/${parts[1]}/${parts[0]}`;
        return dateStr;
    }
</script>
</body>
</html>
