<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, updateDoc, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaOR2mS_AeffwMug6gpcVRzYK04PE82Qw",
            authDomain: "manon-finances.firebaseapp.com",
            projectId: "manon-finances",
            storageBucket: "manon-finances.firebasestorage.app",
            messagingSenderId: "817523658314",
            appId: "1:817523658314:web:3ddc1520cd3612732620b3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const configRef = doc(db, "config", "global");

        onSnapshot(configRef, (doc) => {
            if (!doc.exists()) return;
            const d = doc.data();
            document.getElementById('solde').innerText = d.solde_general + " €";
            document.getElementById('tirelire').innerText = d.tirelire + " €";
            document.getElementById('obj-nom').innerText = d.nom_objectif;
            document.getElementById('obj-val').innerText = d.objectif_courant + " / " + d.prix_objectif + " €";
            const percent = Math.min((d.objectif_courant / d.prix_objectif) * 100, 100);
            document.getElementById('barre').style.width = percent + "%";
        });

        window.agir = async (cible, montant) => {
            let update = { solde_general: increment(-montant) };
            update[cible] = increment(montant);
            await updateDoc(configRef, update);
        };
    </script>
    <style>
        body { font-family: sans-serif; background: #eef2f3; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .montant { font-size: 2.5em; font-weight: bold; color: #2d3436; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <div class="card" style="text-align:center">
        <div>Disponible</div>
        <div class="montant" id="solde">--</div>
    </div>

    <div class="card">
        <h3>Tirelire 🐷</h3>
        <div class="montant" id="tirelire">0 €</div>
        <div class="btn-grid">
            <button style="background:#f39c12" onclick="agir('tirelire', 1)">+ 1 €</button>
            <button style="background:#f39c12" onclick="agir('tirelire', 5)">+ 5 €</button>
            <button style="background:#f39c12" onclick="agir('tirelire', 10)">+ 10 €</button>
        </div>
    </div>

    <div class="card">
        <h3 id="obj-nom">Objectif</h3>
        <div id="obj-val">0 / 0 €</div>
        <div style="background:#eee; height:15px; border-radius:10px; margin:10px 0;">
            <div id="barre" style="background:#0984e3; height:100%; border-radius:10px; width:0%;"></div>
        </div>
        <div class="btn-grid">
            <button style="background:#3498db" onclick="agir('objectif_courant', 1)">+ 1 €</button>
            <button style="background:#3498db" onclick="agir('objectif_courant', 5)">+ 5 €</button>
            <button style="background:#3498db" onclick="agir('objectif_courant', 10)">+ 10 €</button>
        </div>
    </div>
</body>
</html>
