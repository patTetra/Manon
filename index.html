<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget Connecté - Diagnostic</title>
    <script>
        let data = { solde: 0, tirelire: 0, objectif_courant: 0, nom_objectif: "Mon Objectif", cible_objectif: 50, dernier_mois_credit: "", historique: [] };
        let haUrl = localStorage.getItem('ha_url') || "";
        let haToken = localStorage.getItem('ha_token') || "";

        function chargerLocalSecours() {
            let localData = localStorage.getItem('budgetDataConnecte');
            if (localData) data = JSON.parse(localData);
        }

        async function chargerDepuisHomeAssistant() {
            if (!haUrl) { chargerLocalSecours(); afficher(); return; }
            const statutEl = document.getElementById('statut-synchro');
            const diagEl = document.getElementById('erreur-diagnostic');
            statutEl.innerText = "🔄 Tentative de connexion...";
            diagEl.style.display = "none";
            
            try {
                const urlNettoyee = haUrl.replace(/\/$/, "");
                
                statutEl.innerText = "🔄 Test API REST...";
                const reponse = await fetch(`${urlNettoyee}/api/states/todo.application_budget`, {
                    method: 'GET',
                    headers: { 
                        'Authorization': `Bearer ${haToken}`,
                        'Content-Type': 'application/json' 
                    }
                });
                
                if (reponse.ok) {
                    const etatEntite = await reponse.json();
                    if (etatEntite.attributes && etatEntite.attributes.description) {
                        data = JSON.parse(etatEntite.attributes.description);
                        localStorage.setItem('budgetDataConnecte', JSON.stringify(data));
                        statutEl.innerText = "☁️ Synchronisé (API REST)";
                        afficher();
                        return;
                    }
                } else {
                    throw new Error(`Code erreur serveur : ${reponse.status} (${reponse.statusText})`);
                }

            } catch (e) {
                console.error(e);
                statutEl.innerText = "🔌 Mode Local (Échec)";
                diagEl.style.display = "block";
                diagEl.innerText = `🔍 Erreur technique capturée : ${e.message}\n\n👉 Si l'erreur contient "Failed to fetch", c'est le CORS du navigateur qui bloque l'accès à Nabu Casa depuis un fichier local.`;
                chargerLocalSecours();
            }
            afficher();
        }

        async function sauvegarder() {
            localStorage.setItem('budgetDataConnecte', JSON.stringify(data));
            afficher();
            if (!haUrl) return;

            document.getElementById('statut-synchro').innerText = "⏳ Envoi...";
            try {
                const urlNettoyee = haUrl.replace(/\/$/, "");
                await fetch(`${urlNettoyee}/api/webhook/budget_app_synchro_secret_1607`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'ecrire', data: JSON.stringify(data) })
                });
                document.getElementById('statut-synchro').innerText = "☁️ Sauvegardé sur HA";
            } catch (e) {
                document.getElementById('statut-synchro').innerText = "❌ Échec envoi";
            }
        }

        function afficher() {
            document.getElementById('solde').innerText = data.solde.toFixed(2) + " €";
            document.getElementById('param-ha-url').value = haUrl;
            document.getElementById('param-ha-token').value = haToken;
        }

        function ouvrirParametres() { document.getElementById('modal-parametres').style.display = 'flex'; }
        function fermerParametres() { document.getElementById('modal-parametres').style.display = 'none'; }
        function enregistrerParametres() {
            haUrl = document.getElementById('param-ha-url').value.trim();
            haToken = document.getElementById('param-ha-token').value.trim();
            localStorage.setItem('ha_url', haUrl);
            localStorage.setItem('ha_token', haToken);
            fermerParametres(); 
            chargerDepuisHomeAssistant();
        }

        window.onload = function() { chargerDepuisHomeAssistant(); };
    </script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; max-width: 400px; margin: 0 auto 15px auto; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .status { font-weight: bold; color: #e74c3c; margin: 10px 0; }
        .diag { background: #fcedea; border: 1px solid #f5c2c2; color: #c0392b; padding: 12px; border-radius: 8px; text-align: left; font-family: monospace; font-size: 11px; white-space: pre-wrap; display: none; margin: 10px 0; }
        button { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 90%; max-width: 350px; }
        input { width: 100%; padding: 8px; margin: 8px 0; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Test de Connexion 🧪</h2>
        <div id="statut-synchro" class="status">Initialisation...</div>
        <div id="erreur-diagnostic" class="diag"></div>
        <hr>
        <p>Solde actuel : <span id="solde" style="font-weight: bold;">0.00 €</span></p>
        <button onclick="ouvrirParametres()">⚙️ Configurer les accès</button>
    </div>

    <!-- REGLAGES -->
    <div class="modal" id="modal-parametres">
        <div class="modal-content">
            <h3>Configuration</h3>
            <label>URL Nabu Casa :</label>
            <input type="text" id="param-ha-url">
            <label>Jeton (Token Long Terme) :</label>
            <input type="password" id="param-ha-token">
            <button onclick="enregistrerParametres()">Valider et Tester</button>
        </div>
    </div>

</body>
</html>
