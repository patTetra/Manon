<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Manon</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAaOR2mS_AeffwMug6gpcVRzYK04PE82Qw",
            authDomain: "manon-finances.firebaseapp.com",
            projectId: "manon-finances",
            storageBucket: "manon-finances.firebasestorage.app",
            messagingSenderId: "817523658314",
            appId: "1:817523658314:web:3ddc1520cd3612732620b3",
            measurementId: "G-EBPNMD09MW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- Fonctions de gestion ---
        window.ajouterOperation = async (type) => {
            const desc = document.getElementById('desc').value || (type === 'gain' ? "Gain" : "Dépense");
            const montant = parseFloat(document.getElementById('montant').value);
            if (!montant) return alert("Indique un montant");

            const val = type === 'gain' ? montant : -montant;
            await addDoc(collection(db, "operations"), { description: desc, montant: val, date: serverTimestamp() });
            
            const configRef = doc(db, "config", "global");
            const snap = await getDoc(configRef);
            await setDoc(configRef, { solde_global: (snap.data()?.solde_global || 0) + val }, { merge: true });
            
            document.getElementById('desc').value = ''; document.getElementById('montant').value = '';
        };

        // --- Automatisation 1er du mois ---
        async function checkMonthly() {
            const now = new Date();
            const configRef = doc(db, "config", "global");
            const snap = await getDoc(configRef);
            const data = snap.data();
            
            if (now.getDate() === 1 && (data.lastCheckMonth !== now.getMonth())) {
                await setDoc(configRef, { solde_global: (data.solde_global || 0) + 15, lastCheckMonth: now.getMonth() }, { merge: true });
                await addDoc(collection(db, "operations"), { description: "Argent de poche", montant: 15, date: serverTimestamp() });
            }
        }

        // --- Écoute temps réel ---
        onSnapshot(doc(db, "config", "global"), (doc) => {
            if (doc.exists()) {
                document.getElementById('solde').innerText = doc.data().solde_global + " €";
                document.getElementById('obj').innerText = doc.data().objectif || "Objectif non défini";
            }
        });

        onSnapshot(query(collection(db, "operations"), orderBy("date", "desc")), (snapshot) => {
            const hist = document.getElementById('hist');
            hist.innerHTML = "";
            snapshot.forEach(doc => {
                const d = doc.data();
                hist.innerHTML += `<li>${d.description} : <b>${d.montant > 0 ? '+' : ''}${d.montant} €</b></li>`;
            });
        });

        checkMonthly();
    </script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #d1f2eb; padding: 20px; text-align: center; color: #2d3436; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .solde { font-size: 3em; color: #00a86b; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 5px; border-radius: 10px; border: 1px solid #ccc; }
        button { padding: 15px 30px; border: none; border-radius: 10px; background: #00a86b; color: white; font-weight: bold; margin: 5px; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: white; padding: 12px; border-bottom: 1px solid #eee; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Solde disponible</h3>
        <div class="solde" id="solde">-- €</div>
    </div>
    <div class="card">
        <h3 id="obj">Objectif : Chargement...</h3>
        <input type="text" id="desc" placeholder="Libellé">
        <input type="number" id="montant" placeholder="Montant €">
        <div style="display:flex; justify-content: center;">
            <button onclick="ajouterOperation('depense')" style="background:#e74c3c">Dépense 💸</button>
            <button onclick="ajouterOperation('gain')">Gain ✨</button>
        </div>
    </div>
    <h3>Historique</h3>
    <ul id="hist"></ul>
</body>
</html>
