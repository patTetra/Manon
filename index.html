<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget</title>
    <script>
        // Charger les données au démarrage
        let data = JSON.parse(localStorage.getItem('budgetData')) || { 
            solde: 0, 
            tirelire: 0, 
            objectif_courant: 0 
        };

        function sauvegarder() {
            localStorage.setItem('budgetData', JSON.stringify(data));
            afficher();
        }

        function afficher() {
            document.getElementById('solde').innerText = data.solde.toFixed(2) + " €";
            document.getElementById('tirelire').innerText = data.tirelire.toFixed(2) + " €";
            document.getElementById('obj-val').innerText = data.objectif_courant.toFixed(2) + " €";
        }

        // Ajouter de l'argent directement sur le solde
        function ajouterSolde() {
            const input = document.getElementById('input-solde');
            const montant = parseFloat(input.value);
            if (!montant || montant <= 0) return;
            
            data.solde += montant;
            input.value = ''; // Réinitialise l'input
            sauvegarder();
        }

        // Transférer de l'argent entre le solde et une cible (tirelire/objectif)
        // un montant positif met de côté, un montant négatif récupère l'argent
        function transferer(cible, montant) {
            const m = parseFloat(montant);
            if (!m) return;
            
            if (montant > 0) {
                // Épargner : Vérifier si le solde est suffisant
                if (data.solde >= m) {
                    data.solde -= m;
                    data[cible] += m;
                } else {
                    alert("Solde insuffisant pour mettre de côté !");
                    return;
                }
            } else {
                // Récupérer : Vérifier si la tirelire/l'objectif a assez d'argent
                const valeurAbsolue = Math.abs(m);
                if (data[cible] >= valeurAbsolue) {
                    data[cible] -= valeurAbsolue;
                    data.solde += valeurAbsolue;
                } else {
                    alert("Il n'y a pas assez d'argent ici !");
                    return;
                }
            }
            sauvegarder();
        }

        window.onload = afficher;
    </script>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #2ecc71;
            --orange: #e67e22;
            --blue: #3498db;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            margin: 0;
            color: var(--text-main);
        }
        
        .container { max-width: 450px; margin: 0 auto; }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
        }
        
        .solde-card {
            background: linear-gradient(135deg, #1abc9c, #2ecc71);
            color: white;
        }
        .solde-card .montant { color: white; }
        
        .montant { font-size: 2.2em; font-weight: 800; color: var(--text-main); text-align: center; margin: 10px 0; }
        
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.2em; display: flex; align-items: center; gap: 8px;}
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 12px 0; }
        
        button { 
            border: none; 
            padding: 12px 8px; 
            border-radius: 12px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            transition: transform 0.1s, opacity 0.2s;
            font-size: 0.95em;
        }
        button:active { transform: scale(0.95); }
        button.btn-retrait { background-color: #e74c3c !important; }
        
        .action-input { display: flex; gap: 8px; margin-top: 10px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            font-size: 1em;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        .btn-add { background: var(--text-main); }
    </style>
</head>
<body>
    <div class="container">
        <!-- BLOC SOLDE -->
        <div class="card solde-card">
            <div style="text-align:center; font-weight: 600; opacity: 0.9;">Argent de poche disponible</div>
            <div class="montant" id="solde">0.00 €</div>
            
            <div class="action-input">
                <input type="number" id="input-solde" placeholder="Ex: 10" min="0" step="any">
                <button class="btn-add" onclick="ajouterSolde()">Ajouter</button>
            </div>
        </div>
        
        <!-- BLOC TIRELIRE -->
        <div class="card">
            <h3><span>🐷</span> Tirelire (Épargne)</h3>
            <div class="montant" id="tirelire">0.00 €</div>
            <div style="font-size: 0.85em; color: #7f8c8d; text-align: center;">Mettre de côté :</div>
            <div class="btn-grid">
                <button style="background:var(--orange)" onclick="transferer('tirelire', 1)">+ 1 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 5)">+ 5 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 10)">+ 10 €</button>
            </div>
            <div class="btn-grid" style="grid-template-columns: 1fr;">
                <button class="btn-retrait" onclick="transferer('tirelire', -prompt('Combien veux-tu récupérer ?'))">Tout ou partie récupérer ↩</button>
            </div>
        </div>

        <!-- BLOC OBJECTIF -->
        <div class="card">
            <h3><span>🎯</span> Mon Objectif (Projet)</h3>
            <div class="montant" id="obj-val">0.00 €</div>
            <div style="font-size: 0.85em; color: #7f8c8d; text-align: center;">Ajouter au projet :</div>
            <div class="btn-grid">
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 1)">+ 1 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 5)">+ 5 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 10)">+ 10 €</button>
            </div>
            <div class="btn-grid" style="grid-template-columns: 1fr;">
                <button class="btn-retrait" onclick="transferer('objectif_courant', -prompt('Combien veux-tu récupérer ?'))">Récupérer pour acheter ↩</button>
            </div>
        </div>
    </div>
</body>
</html>
