<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget Connected</title>
    <style>
        :root { 
            --bg-color: #f7f9fa; 
            --card-bg: #ffffff; 
            --text-main: #2d3436; 
            --primary: #2ecc71; 
            --orange: #e67e22; 
            --blue: #3498db; 
            --red: #e74c3c; 
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            margin: 0; 
            color: var(--text-main); 
        }
        .container { max-width: 450px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .header h1 { font-size: 1.4em; margin: 0; }
        .synchro-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .synchro-status { font-size: 0.8em; color: #7f8c8d; font-weight: 600;}
        .btn-sync-force { background: #e2e8f0; color: #475569; padding: 4px 8px; border-radius: 8px; font-size: 0.75em; border: none; font-weight: bold; cursor: pointer; }
        .btn-param { background: none; border: none; font-size: 1.6em; cursor: pointer; color: #7f8c8d; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 24px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); }
        .solde-card { background: linear-gradient(135deg, #1abc9c, #2ecc71); color: white; text-align: center; }
        .solde-card .montant { color: white; }
        .badge { display: inline-block; padding: 5px 12px; border-radius: 20px; font-size: 0.8em; font-weight: bold; color: white; margin-top: 5px; }
        .tirelire-card { background-color: #ffe6d9; }
        .objectif-card { background-color: #dbeaff; }
        .montant { font-size: 2.2em; font-weight: 800; text-align: center; margin: 10px 0; }
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.15em; }
        .progress-container { background: rgba(0, 0, 0, 0.08); border-radius: 10px; height: 12px; width: 100%; margin: 10px 0 5px 0; overflow: hidden; }
        .progress-bar { height: 100%; width: 0%; transition: width 0.4s ease-out, background-color 0.4s; }
        .progress-info { display: flex; justify-content: space-between; font-size: 0.85em; color: #5d6a6b; margin-bottom: 12px; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        button { border: none; padding: 12px; border-radius: 12px; font-weight: bold; color: white; cursor: pointer; font-size: 0.95em; }
        button:active { transform: scale(0.96); }
        button.btn-retrait { background: var(--red); width: 100%; margin-top: 10px; padding: 10px;}
        .solde-actions { display: flex; gap: 10px; margin-top: 15px; }
        .solde-actions button { flex: 1; background: rgba(255,255,255,0.25); border: 1.5px solid white; font-size: 0.9em; }
        .action-input { display: flex; gap: 8px; margin-top: 8px; }
        input { flex: 1; padding: 11px; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 1em; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--text-main); }
        .liste-historique { max-height: 250px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .hist-desc { font-weight: 600; font-size: 0.95em; }
        .hist-date { font-size: 0.8em; color: #7f8c8d; }
        .hist-montant { font-weight: 700; }
        .montant-plus { color: #27ae60; }
        .montant-moins { color: var(--red); }
        .vide { text-align: center; color: #95a5a6; padding: 15px 0; font-size: 0.9em; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; padding: 15px; box-sizing: border-box; }
        .modal-content { background: white; padding: 22px; border-radius: 24px; width: 100%; max-width: 400px; max-height: 85vh; overflow-y: auto; color: var(--text-main); }
        .modal-content h2 { margin-top: 0; font-size: 1.3em; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 4px; font-weight: 600; font-size: 0.85em; }
        .form-group input { width: 100%; }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-actions button { flex: 1; }
        .btn-secondary { background: #bdc3c7; color: #2d3436; }
        .param-section { border-top: 2px dashed #eee; margin-top: 15px; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Mon Budget Connected 💸</h1>
            <button class="btn-param" onclick="demanderCodePIN()">⚙️</button>
        </div>
        <div class="synchro-box">
            <div class="synchro-status" id="statut-synchro">🔌 Mode Local (Hors ligne)</div>
            <button class="btn-sync-force" onclick="fetchAllEntities()">🔄 Forcer Synchro</button>
        </div>

        <!-- SOLDE -->
        <div class="card solde-card">
            <div style="font-weight: 600; opacity: 0.9;">Argent de poche disponible</div>
            <div class="montant" id="solde">0.00 €</div>
            <div class="badge" id="badge-statut">🌱 Écureuil Débutant</div>
            <div class="solde-actions"><button onclick="ouvrirGain()">➕ Recevoir</button><button onclick="abrirDepense()">🛒 Un Achat</button></div>
        </div>
        
        <!-- TIRELIRE -->
        <div class="card tirelire-card">
            <h3>🐷 Tirelire (Épargne)</h3>
            <div class="montant" id="tirelire">0.00 €</div>
            <div class="btn-grid">
                <button style="background:var(--orange)" onclick="transfererVersEpargne('tirelire', 1)">+ 1 €</button>
                <button style="background:var(--orange)" onclick="transfererVersEpargne('tirelire', 5)">+ 5 €</button>
                <button style="background:var(--orange)" onclick="transfererVersEpargne('tirelire', 10)">+ 10 €</button>
            </div>
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-tirelire" placeholder="Autre montant...">
                <button style="background:var(--orange);" onclick="actionEpargnePerso('tirelire', 'input-tirelire')">OK</button>
            </div>
            <button class="btn-retrait" style="background: var(--orange)" onclick="ouvrirRetrait('tirelire')">Récupérer de l'argent ↩</button>
        </div>

        <!-- OBJECTIF -->
        <div class="card objectif-card">
            <h3 id="titre-objectif">🎯 Mon Objectif</h3>
            <div class="montant" id="obj-val">0.00 €</div>
            <div class="progress-container"><div class="progress-bar" id="barre-progression"></div></div>
            <div class="progress-info"><span id="pourcentage-text">0%</span><span id="obj-cible-text">sur 50.00 €</span></div>
            <div class="btn-grid">
                <button style="background:var(--blue)" onclick="transfererVersEpargne('objectif', 1)">+ 1 €</button>
                <button style="background:var(--blue)" onclick="transfererVersEpargne('objectif', 5)">+ 5 €</button>
                <button style="background:var(--blue)" onclick="transfererVersEpargne('objectif', 10)">+ 10 €</button>
            </div>
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-objectif" placeholder="Autre montant...">
                <button style="background:var(--blue);" onclick="actionEpargnePerso('objectif', 'input-objectif')">OK</button>
            </div>
            <button class="btn-retrait" style="background: var(--blue)" onclick="ouvrirRetrait('objectif')">Récupérer pour acheter ↩</button>
        </div>

        <!-- HISTORIQUE -->
        <div class="card"><h3>📊 Mon Historique</h3><div class="liste-historique" id="liste-historique"></div></div>
    </div>

    <!-- MODALS -->
    <div class="modal" id="modal-gain">
        <div class="modal-content">
            <h2>➕ Recevoir</h2>
            <div class="form-group"><label>Montant (€)</label><input type="number" inputmode="decimal" id="gain-montant"></div>
            <div class="form-group"><label>Provenance</label><input type="text" id="gain-desc"></div>
            <div class="form-group"><label>Date</label><input type="date" id="gain-date"></div>
            <div class="modal-actions"><button class="btn-secondary" onclick="fermerGain()">Annuler</button><button style="background: var(--primary);" onclick="enregistrerGain()">Ajouter</button></div>
        </div>
    </div>

    <div class="modal" id="modal-depense">
        <div class="modal-content">
            <h2>🛒 Un Achat</h2>
            <div class="form-group"><label>Montant (€)</label><input type="number" inputmode="decimal" id="depense-montant"></div>
            <div class="form-group"><label>Qu'as-tu acheté ?</label><input type="text" id="depense-desc"></div>
            <div class="form-group"><label>Date</label><input type="date" id="depense-date"></div>
            <div class="modal-actions"><button class="btn-secondary" onclick="fermerDepense()">Annuler</button><button style="background: var(--red);" onclick="enregistrerDepense()">Valider</button></div>
        </div>
    </div>

    <div class="modal" id="modal-retrait">
        <div class="modal-content">
            <h2 id="retrait-titre">↩ Récupérer</h2>
            <div id="retrait-max" style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 12px;"></div>
            <div class="form-group"><label>Montant (€)</label><input type="number" inputmode="decimal" id="retrait-montant"></div>
            <div class="modal-actions"><button class="btn-secondary" onclick="fermerRetrait()">Annuler</button><button style="background: var(--primary);" onclick="validerRetrait()">Confirmer</button></div>
        </div>
    </div>

    <!-- SÉCURITÉ PIN -->
    <div class="modal" id="modal-securite">
        <div class="modal-content">
            <h2 style="text-align: center;">🔒 Code PIN Requis</h2>
            <div class="form-group">
                <input type="password" inputmode="numeric" id="code-pincode" maxlength="4" style="text-align: center; font-size: 1.6em; letter-spacing: 10px;" placeholder="****">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" onclick="fermerSecurite()">Annuler</button>
                <button style="background: var(--primary);" onclick="validerCodePIN()">Valider</button>
            </div>
        </div>
    </div>

    <!-- REGLAGES -->
    <div class="modal" id="modal-parametres">
        <div class="modal-content">
            <h2>⚙️ Réglages & Synchro</h2>
            <div class="form-group"><label>Modifier Solde (€)</label><input type="number" inputmode="decimal" id="param-solde"></div>
            <div class="form-group"><label>Nom de l'objectif</label><input type="text" id="param-nom-obj"></div>
            <div class="form-group"><label>Cible objectif (€)</label><input type="number" inputmode="decimal" id="param-cible-obj"></div>
            
            <!-- SECTION PROTÉGÉE PAR LE PIN -->
            <div class="param-section">
                <label style="font-weight: bold; display:block; margin-bottom: 8px; color: var(--blue);">☁️ Connexion Home Assistant (Protégé)</label>
                <div class="form-group">
                    <label>URL d'instance ou Nabu Casa</label>
                    <input type="text" id="param-ha-url" placeholder="https://xxx.ui.nabu.casa">
                </div>
                <div class="form-group">
                    <label>Jeton d'accès de longue durée (Token)</label>
                    <input type="password" id="param-ha-token" placeholder="eyJhbGciOiJIUzI1Ni...">
                </div>
                <div style="margin-top: 15px; padding-top: 5px;">
                    <button style="background: var(--red); width: 100%; font-size: 0.9em; padding: 10px;" onclick="reinitialiserDonneesHA()">⚠️ Tout Réinitialiser les données</button>
                </div>
            </div>
            
            <div class="modal-actions" style="margin-top: 20px;"><button class="btn-secondary" onclick="fermerParametres()">Fermer</button><button style="background: var(--primary);" onclick="enregistrerParametres()">Enregistrer</button></div>
        </div>
    </div>

    <script>
        let currentSolde = 0;
        let currentTirelire = 0;
        let currentObjectifActuel = 0;
        let currentObjectifCible = 50;
        let currentNomObjectif = "Mon Objectif";
        let currentHistory = [];
        
        let cibleRetraitEnCours = "";

        document.addEventListener("DOMContentLoaded", () => {
            const savedUrl = localStorage.getItem("ha_url");
            const savedToken = localStorage.getItem("ha_token");
            if (savedUrl && savedToken) {
                fetchAllEntities();
            } else {
                document.getElementById('statut-synchro').innerText = "🔌 Mode Local (Non configuré)";
                afficher();
            }
        });

        // Lecture d'une entité (GET)
        async function fetchEntityState(entityId) {
            const url = localStorage.getItem("ha_url");
            const token = localStorage.getItem("ha_token");
            if (!url || !token) return null;
            
            const response = await fetch(`${url}/api/states/${entityId}`, {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }
            });
            if (!response.ok) return null;
            return await response.json();
        }

        // Écriture via Service HA (POST)
        async function callHAService(domain, service, data) {
            const url = localStorage.getItem("ha_url");
            const token = localStorage.getItem("ha_token");
            if (!url || !token) return false;

            const response = await fetch(`${url}/api/services/${domain}/${service}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return response.ok;
        }

        // Synchronisation globale (Lecture)
        async function fetchAllEntities() {
            const url = localStorage.getItem("ha_url");
            const token = localStorage.getItem("ha_token");
            if (!url || !token) return;

            document.getElementById('statut-synchro').innerText = "🔄 Synchronisation...";

            try {
                const [soldeData, tirelireData, objActuelData, objCibleData, nomObjData, historyData] = await Promise.all([
                    fetchEntityState('input_number.solde_courant'),
                    fetchEntityState('input_number.solde_tirelire'),
                    fetchEntityState('input_number.objectif_montant_actuel'),
                    fetchEntityState('input_number.objectif_montant_cible'),
                    fetchEntityState('input_text.nom_objective') || fetchEntityState('input_text.nom_objectif'),
                    fetchEntityState('input_text.budget_historique')
                ]);

                currentSolde = soldeData ? parseFloat(soldeData.state) : 0;
                currentTirelire = tirelireData ? parseFloat(tirelireData.state) : 0;
                currentObjectifActuel = objActuelData ? parseFloat(objActuelData.state) : 0;
                currentObjectifCible = objCibleData ? parseFloat(objCibleData.state) : 50;
                currentNomObjectif = nomObjData ? nomObjData.state : "Mon Objectif";

                if (historyData && historyData.state && historyData.state !== 'unknown') {
                    try { currentHistory = JSON.parse(historyData.state); } catch(e) { currentHistory = []; }
                } else {
                    currentHistory = [];
                }

                document.getElementById('statut-synchro').innerText = "☁️ Synchronisé avec HA";
            } catch (error) {
                console.error(error);
                document.getElementById('statut-synchro').innerText = "❌ Erreur de liaison HA";
            }

            afficher();
        }

        function obtenirBadge(total) {
            if (total < 20) return { nom: "🌱 Écureuil Débutant", couleur: "#7f8c8d" };
            if (total < 70) return { nom: "🎯 Apprenti Épargnant", couleur: "#3498db" };
            if (total < 150) return { nom: "🐷 Pro de la Tirelire", couleur: "#e67e22" };
            if (total < 300) return { nom: "🏆 As du Trésor", couleur: "#9b59b6" };
            return { nom: "👑 Maître du Budget", couleur: "#27ae60" };
        }

        function afficher() {
            const fortuneTotale = currentSolde + currentTirelire + currentObjectifActuel;
            document.getElementById('solde').innerText = currentSolde.toFixed(2) + " €";
            document.getElementById('tirelire').innerText = currentTirelire.toFixed(2) + " €";
            document.getElementById('obj-val').innerText = currentObjectifActuel.toFixed(2) + " €";
            document.getElementById('titre-objectif').innerText = "🎯 " + currentNomObjectif;
            document.getElementById('obj-cible-text').innerText = "sur " + currentObjectifCible.toFixed(2) + " €";

            let pourcentage = currentObjectifCible > 0 ? (currentObjectifActuel / currentObjectifCible) * 100 : 0;
            if (pourcentage > 100) pourcentage = 100;
            const barre = document.getElementById('barre-progression');
            barre.style.width = pourcentage + "%";
            barre.style.background = pourcentage < 40 ? "var(--orange)" : (pourcentage < 80 ? "var(--blue)" : "var(--primary)");
            document.getElementById('pourcentage-text').innerText = Math.round(pourcentage) + "%";

            const badge = obtenirBadge(fortuneTotale);
            const badgeEl = document.getElementById('badge-statut');
            badgeEl.innerText = badge.nom; badgeEl.style.backgroundColor = badge.couleur;

            document.getElementById('param-solde').value = currentSolde;
            document.getElementById('param-nom-obj').value = currentNomObjectif;
            document.getElementById('param-cible-obj').value = currentObjectifCible;
            document.getElementById('param-ha-url').value = localStorage.getItem("ha_url") || "";
            document.getElementById('param-ha-token').value = localStorage.getItem("ha_token") || "";

            const aujourdhuiIso = new Date().toISOString().split('T')[0];
            document.getElementById('depense-date').value = aujourdhuiIso;
            document.getElementById('gain-date').value = aujourdhuiIso;

            const listeHistorique = document.getElementById('liste-historique');
            listeHistorique.innerHTML = "";
            if (currentHistory.length === 0) {
                listeHistorique.innerHTML = "<div class='vide'>Aucune opération enregistrée.</div>";
            } else {
                [...currentHistory].reverse().forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'hist-item';
                    const estGain = item.type === 'gain';
                    const dateFr = item.date.split('-').reverse().join('/');
                    div.innerHTML = `<div><div class="hist-desc">${item.desc}</div><div class="hist-date">${dateFr}</div></div>
                                    <div class="hist-montant ${estGain ? 'montant-plus' : 'montant-moins'}">${estGain ? '+' : '-'} ${item.montant.toFixed(2)} €</div>`;
                    listeHistorique.appendChild(div);
                });
            }
        }

        function empilerHistorique(type, desc, montant, date) {
            const nouveauLog = { date: date, type: type, desc: desc, montant: parseFloat(montant) };
            currentHistory.push(nouveauLog);
            if (currentHistory.length > 10) currentHistory.shift(); 
        }

        async function pushMutations(promises) {
            promises.push(
                callHAService('input_text', 'set_value', { entity_id: 'input_text.budget_historique', value: JSON.stringify(currentHistory) })
            );
            document.getElementById('statut-synchro').innerText = "⏳ Envoi vers HA...";
            await Promise.all(promises);
            await fetchAllEntities();
        }

        // GESTION DU LOCK PAR CODE PIN
        function demanderCodePIN() {
            document.getElementById('code-pincode').value = '';
            document.getElementById('modal-securite').style.display = 'flex';
        }
        function fermerSecurite() {
            document.getElementById('modal-securite').style.display = 'none';
        }
        function validerCodePIN() {
            const code = document.getElementById('code-pincode').value;
            if (code === "1607") {
                fermerSecurite();
                ouvrirParametres();
            } else {
                alert("Code PIN incorrect ! 🔐");
                document.getElementById('code-pincode').value = '';
            }
        }

        function ouvrirParametres() { document.getElementById('modal-parametres').style.display = 'flex'; }
        function fermerParametres() { document.getElementById('modal-parametres').style.display = 'none'; }
        
        // BOUTON DE RÉINITIALISATION COMPLÈTE (RAZ SUR HA)
        async function reinitialiserDonneesHA() {
            if (confirm("⚠️ Es-tu sûr de vouloir réinitialiser TOUS tes montants, objectifs et l'historique sur Home Assistant ?")) {
                currentSolde = 0;
                currentTirelire = 0;
                currentObjectifActuel = 0;
                currentObjectifCible = 50;
                currentNomObjectif = "Mon Objectif";
                currentHistory = [];

                fermerParametres();
                document.getElementById('statut-synchro').innerText = "⏳ Réinitialisation HA...";

                await pushMutations([
                    callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: 0 }),
                    callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_tirelire', value: 0 }),
                    callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_actuel', value: 0 }),
                    callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_cible', value: 50 }),
                    callHAService('input_text', 'set_value', { entity_id: 'input_text.nom_objective', value: "Mon Objectif" }),
                    callHAService('input_text', 'set_value', { entity_id: 'input_text.nom_objectif', value: "Mon Objectif" })
                ]);
                alert("✅ Toutes les données ont été remises à zéro !");
            }
        }

        async function enregistrerParametres() {
            const nvSolde = parseFloat(document.getElementById('param-solde').value);
            const nvNom = document.getElementById('param-nom-obj').value.trim();
            const nvCible = parseFloat(document.getElementById('param-cible-obj').value);
            
            let url = document.getElementById('param-ha-url').value.trim();
            if(url.endsWith('/')) url = url.slice(0, -1);
            const token = document.getElementById('param-ha-token').value.trim();

            localStorage.setItem("ha_url", url);
            localStorage.setItem("ha_token", token);

            let promises = [];
            if (!isNaN(nvSolde) && nvSolde !== currentSolde) {
                currentSolde = nvSolde;
                promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: currentSolde }));
            }
            if (nvNom && nvNom !== currentNomObjectif) {
                currentNomObjectif = nvNom;
                promises.push(callHAService('input_text', 'set_value', { entity_id: 'input_text.nom_objective', value: currentNomObjectif }));
                promises.push(callHAService('input_text', 'set_value', { entity_id: 'input_text.nom_objectif', value: currentNomObjectif }));
            }
            if (!isNaN(nvCible) && nvCible >= 0 && nvCible !== currentObjectifCible) {
                currentObjectifCible = nvCible;
                promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_cible', value: currentObjectifCible }));
            }

            fermerParametres();
            if(promises.length > 0) {
                await pushMutations(promises);
            } else {
                await fetchAllEntities();
            }
        }

        function ouvrirGain() { document.getElementById('modal-gain').style.display = 'flex'; }
        function fermerGain() { document.getElementById('modal-gain').style.display = 'none'; }
        async function enregistrerGain() {
            const m = parseFloat(document.getElementById('gain-montant').value);
            const d = document.getElementById('gain-desc').value.trim();
            const dt = document.getElementById('gain-date').value;
            if (!m || m <= 0 || !d || !dt) { alert("Remplis toutes les cases !"); return; }
            
            currentSolde += m;
            empilerHistorique('gain', d, m, dt);
            fermerGain();
            
            await pushMutations([
                callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: currentSolde })
            ]);
            document.getElementById('gain-montant').value = ''; document.getElementById('gain-desc').value = '';
        }

        function abrirDepense() { document.getElementById('modal-depense').style.display = 'flex'; }
        function fermerDepense() { document.getElementById('modal-depense').style.display = 'none'; }
        async function enregistrerDepense() {
            const m = parseFloat(document.getElementById('depense-montant').value);
            const d = document.getElementById('depense-desc').value.trim();
            const dt = document.getElementById('depense-date').value;
            if (!m || m <= 0 || !d || !dt) { alert("Remplis toutes les cases !"); return; }
            
            if (currentSolde >= m) {
                currentSolde -= m;
                empilerHistorique('depense', d, m, dt);
                fermerDepense();
                
                await pushMutations([
                    callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: currentSolde })
                ]);
                document.getElementById('depense-montant').value = ''; document.getElementById('depense-desc').value = '';
            } else { alert("Solde insuffisant !"); }
        }

        async function transfererVersEpargne(cible, montant) {
            const m = parseFloat(montant);
            if (!m || m <= 0) return;
            if (currentSolde >= m) {
                currentSolde -= m;
                const aujourdhuiIso = new Date().toISOString().split('T')[0];
                let promises = [callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: currentSolde })];
                
                if (cible === 'tirelire') {
                    currentTirelire += m;
                    empilerHistorique('depense', `🐷 Vers Tirelire`, m, aujourdhuiIso);
                    promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_tirelire', value: currentTirelire }));
                } else if (cible === 'objectif') {
                    currentObjectifActuel += m;
                    empilerHistorique('depense', `🎯 Vers Objectif`, m, aujourdhuiIso);
                    promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_actuel', value: currentObjectifActuel }));
                }
                
                await pushMutations(promises);
            } else { alert("Solde insuffisant !"); }
        }

        function actionEpargnePerso(cible, inputId) {
            const input = document.getElementById(inputId); transfererVersEpargne(cible, input.value); input.value = '';
        }

        function ouvrirRetrait(cible) {
            cibleRetraitEnCours = cible;
            const maxVal = cible === 'tirelire' ? currentTirelire : currentObjectifActuel;
            document.getElementById('retrait-titre').innerText = `↩ Récupérer de ` + (cible === 'tirelire' ? "la Tirelire" : "l'Objectif");
            document.getElementById('retrait-max').innerText = `Maximum disponible : ${maxVal.toFixed(2)} €`;
            document.getElementById('retrait-montant').value = ''; document.getElementById('modal-retrait').style.display = 'flex';
        }
        function fermerRetrait() { document.getElementById('modal-retrait').style.display = 'none'; }
        async function validerRetrait() {
            const m = parseFloat(document.getElementById('retrait-montant').value);
            if (!m || m <= 0) return;
            
            const maxVal = cibleRetraitEnCours === 'tirelire' ? currentTirelire : currentObjectifActuel;
            if (m <= maxVal) {
                currentSolde += m;
                const aujourdhuiIso = new Date().toISOString().split('T')[0];
                let promises = [callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_courant', value: currentSolde })];
                
                if (cibleRetraitEnCours === 'tirelire') {
                    currentTirelire -= m;
                    empilerHistorique('gain', `↩ Retrait Tirelire`, m, aujourdhuiIso);
                    promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.solde_tirelire', value: currentTirelire }));
                } else {
                    currentObjectifActuel -= m;
                    empilerHistorique('gain', `↩ Retrait Objectif`, m, aujourdhuiIso);
                    promises.push(callHAService('input_number', 'set_value', { entity_id: 'input_number.objectif_montant_actuel', value: currentObjectifActuel }));
                }
                
                fermerRetrait();
                await pushMutations(promises);
            } else { alert("Montant indisponible !"); }
        }
    </script>
</body>
</html>
