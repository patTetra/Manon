<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget</title>
    <script>
        // Charger les données au démarrage
        let data = JSON.parse(localStorage.getItem('budgetData')) || { 
            solde: 0, 
            tirelire: 0, 
            objectif_courant: 0,
            nom_objectif: "Mon Objectif",
            cible_objectif: 50,
            dernier_mois_credit: "",
            historique: [] // Historique global (gains et dépenses)
        };

        // Variables temporaires pour savoir quelle cible on est en train de vider
        let cibleRetraitEnCours = "";

        // Compatibilité avec les anciennes sauvegardes
        if (!data.nom_objectif) data.nom_objectif = "Mon Objectif";
        if (!data.cible_objectif) data.cible_objectif = 50;
        if (!data.dernier_mois_credit) data.dernier_mois_credit = "";
        if (!data.historique) {
            data.historique = [];
            // Migration des anciennes dépenses vers le nouvel historique si nécessaire
            if (data.depenses) {
                data.depenses.forEach(d => {
                    data.historique.push({ type: 'depense', montant: d.montant, desc: d.desc, date: d.date });
                });
                delete data.depenses;
            }
        }

        function sauvegarder() {
            localStorage.setItem('budgetData', JSON.stringify(data));
            afficher();
        }

        // Argent de poche automatique (15€ tous les 1er du mois)
        function verifierArgentDePoche() {
            const aujourdhui = new Date();
            const annee = aujourdhui.getFullYear();
            const mois = String(aujourdhui.getMonth() + 1).padStart(2, '0');
            const moisCourantStr = `${annee}-${mois}`;

            if (data.dernier_mois_credit !== moisCourantStr) {
                const dateIso = aujourdhui.toISOString().split('T')[0];
                data.solde += 15;
                data.historique.push({
                    type: 'gain',
                    montant: 15,
                    desc: "💰 Argent de poche du mois",
                    date: dateIso
                });
                data.dernier_mois_credit = moisCourantStr;
                sauvegarder();
                
                setTimeout(() => {
                    alert("🎉 C'est le nouveau mois ! Tes 15 € d'argent de poche ont été ajoutés à ton solde !");
                }, 500);
            }
        }

        function afficher() {
            document.getElementById('solde').innerText = data.solde.toFixed(2) + " €";
            document.getElementById('tirelire').innerText = data.tirelire.toFixed(2) + " €";
            document.getElementById('obj-val').innerText = data.objectif_courant.toFixed(2) + " €";
            
            document.getElementById('titre-objectif').innerText = "🎯 " + data.nom_objectif;
            document.getElementById('obj-cible-text').innerText = "sur " + data.cible_objectif.toFixed(2) + " €";

            let pourcentage = 0;
            if (data.cible_objectif > 0) {
                pourcentage = (data.objectif_courant / data.cible_objectif) * 100;
                if (pourcentage > 100) pourcentage = 100;
            }
            document.getElementById('barre-progression').style.width = pourcentage + "%";
            document.getElementById('pourcentage-text').innerText = Math.round(pourcentage) + "%";

            // Pré-remplir les paramètres
            document.getElementById('param-solde').value = data.solde;
            document.getElementById('param-nom-obj').value = data.nom_objectif;
            document.getElementById('param-cible-obj').value = data.cible_objectif;

            // Mettre à jour les dates par défaut des modales
            const aujourdhui = new Date().toISOString().split('T')[0];
            document.getElementById('depense-date').value = aujourdhui;
            document.getElementById('gain-date').value = aujourdhui;

            // Afficher l'historique complet
            const listeHistorique = document.getElementById('liste-historique');
            listeHistorique.innerHTML = "";
            
            if (data.historique.length === 0) {
                listeHistorique.innerHTML = "<div class='vide'>Aucune opération enregistrée pour le moment.</div>";
            } else {
                const histInverse = [...data.historique].reverse();
                histInverse.forEach(item => {
                    const dateFormatee = item.date.split('-').reverse().join('/');
                    const div = document.createElement('div');
                    div.className = 'hist-item';
                    
                    const estGain = item.type === 'gain';
                    const signe = estGain ? '+' : '-';
                    const classeMontant = estGain ? 'montant-plus' : 'montant-moins';

                    div.innerHTML = `
                        <div>
                            <div class="hist-desc">${item.desc}</div>
                            <div class="hist-date">${dateFormatee}</div>
                        </div>
                        <div class="hist-montant ${classeMontant}">${signe} ${item.montant.toFixed(2)} €</div>
                    `;
                    listeHistorique.appendChild(div);
                });
            }
        }

        // Fenêtre Ajouter de l'argent
        function ouvrirGain() { document.getElementById('modal-gain').style.display = 'flex'; }
        function fermerGain() { document.getElementById('modal-gain').style.none = 'none'; document.getElementById('modal-gain').style.display = 'none';}
        
        function enregistrerGain() {
            const inputMontant = document.getElementById('gain-montant');
            const inputDesc = document.getElementById('gain-desc');
            const inputDate = document.getElementById('gain-date');

            const montant = parseFloat(inputMontant.value);
            const desc = inputDesc.value.trim();
            const date = inputDate.value;

            if (!montant || montant <= 0 || !desc || !date) {
                alert("Remplis toutes les cases pour ajouter l'argent !");
                return;
            }

            data.solde += montant;
            data.historique.push({ type: 'gain', montant, desc, date });
            
            inputMontant.value = '';
            inputDesc.value = '';
            sauvegarder();
            fermerGain();
        }

        function verifierObjectifAtteint(cible, montantAjoute) {
            if (cible === 'objectif_courant') {
                if (data.objectif_courant >= data.cible_objectif && (data.objectif_courant - montantAjoute) < data.cible_objectif) {
                    setTimeout(() => {
                        alert(`🥳 BRAVO ! Tu as atteint ton objectif pour "${data.nom_objectif}" (${data.cible_objectif.toFixed(2)} €) ! Tu peux être fière de toi ! 🎉🏆`);
                    }, 400);
                }
            }
        }

        function transferer(cible, montant) {
            const m = parseFloat(montant);
            if (!m || m <= 0) return;

            if (data.solde >= m) {
                data.solde -= m;
                data[cible] += m;
                sauvegarder();
                verifierObjectifAtteint(cible, m);
            } else {
                alert("Solde insuffisant dans ton argent de poche !");
            }
        }

        function actionEpargnePerso(cible, inputId) {
            const input = document.getElementById(inputId);
            const montant = parseFloat(input.value);
            if (!montant || montant <= 0) return;

            if (data.solde >= montant) {
                data.solde -= montant;
                data[cible] += montant;
                input.value = '';
                sauvegarder();
                verifierObjectifAtteint(cible, montant);
            } else {
                alert("Solde insuffisant dans ton argent de poche !");
            }
        }

        function ouvrirRetrait(cible) {
            cibleRetraitEnCours = cible;
            const nomAffichage = cible === 'tirelire' ? "la Tirelire" : `l'Objectif (${data.nom_objectif})`;
            const maxDispo = data[cible].toFixed(2);
            
            document.getElementById('retrait-titre').innerText = `↩ Récupérer de ` + nomAffichage;
            document.getElementById('retrait-max').innerText = `Maximum disponible : ${maxDispo} €`;
            document.getElementById('retrait-montant').value = '';
            document.getElementById('modal-retrait').style.display = 'flex';
        }

        function fermerRetrait() { document.getElementById('modal-retrait').style.display = 'none'; }

        function validerRetrait() {
            const input = document.getElementById('retrait-montant');
            const montant = parseFloat(input.value);
            const montantDispo = data[cibleRetraitEnCours];

            if (!montant || montant <= 0) {
                alert("Indique un montant valide à récupérer.");
                return;
            }

            if (montant <= montantDispo) {
                data[cibleRetraitEnCours] -= montant;
                data.solde += montant;
                sauvegarder();
                fermerRetrait();
            } else {
                alert("Tu ne peux pas récupérer plus que ce que tu as !");
            }
        }

        function ouvrirDepense() { document.getElementById('modal-depense').style.display = 'flex'; }
        function fermerDepense() { document.getElementById('modal-depense').style.display = 'none'; }

        function enregistrerDepense() {
            const inputMontant = document.getElementById('depense-montant');
            const inputDesc = document.getElementById('depense-desc');
            const inputDate = document.getElementById('depense-date');

            const montant = parseFloat(inputMontant.value);
            const desc = inputDesc.value.trim();
            const date = inputDate.value;

            if (!montant || montant <= 0 || !desc || !date) {
                alert("Remplis bien toutes les cases pour enregistrer la dépense !");
                return;
            }

            if (data.solde >= montant) {
                data.solde -= montant;
                data.historique.push({ type: 'depense', montant, desc, date });
                inputMontant.value = '';
                inputDesc.value = '';
                sauvegarder();
                fermerDepense();
            } else {
                alert("Aïe ! Ton solde disponible est insuffisant pour faire cette dépense.");
            }
        }

        function ouvrirParametres() { document.getElementById('modal-parametres').style.display = 'flex'; }
        function fermerParametres() { document.getElementById('modal-parametres').style.display = 'none'; }

        function enregistrerParametres() {
            const nvSolde = parseFloat(document.getElementById('param-solde').value);
            const nvNom = document.getElementById('param-nom-obj').value.trim();
            const nvCible = parseFloat(document.getElementById('param-cible-obj').value);

            if (!isNaN(nvSolde)) data.solde = nvSolde;
            if (nvNom) data.nom_objectif = nvNom;
            if (!isNaN(nvCible) && nvCible >= 0) data.cible_objectif = nvCible;

            sauvegarder();
            fermerParametres();
        }

        function reinitialiserTout() {
            if (confirm("⚠️ Es-tu sûr(e) de vouloir TOUT réinitialiser ? Cela va effacer le solde, la tirelire, l'objectif et TOUT l'historique !")) {
                data = { 
                    solde: 0, 
                    tirelire: 0, 
                    objectif_courant: 0,
                    nom_objectif: "Mon Objectif",
                    cible_objectif: 50,
                    dernier_mois_credit: "",
                    historique: []
                };
                sauvegarder();
                fermerParametres();
                alert("L'application a été remise à zéro !");
            }
        }

        window.onload = function() {
            afficher();
            verifierArgentDePoche();
        };
    </script>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #2ecc71;
            --orange: #e67e22;
            --blue: #3498db;
            --red: #e74c3c;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            margin: 0;
            color: var(--text-main);
        }
        
        .container { max-width: 450px; margin: 0 auto; position: relative; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }
        .header h1 { font-size: 1.5em; margin: 0; font-weight: 700; }
        .btn-param {
            background: none;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            padding: 5px;
            color: #7f8c8d;
            transition: transform 0.3s;
        }
        .btn-param:hover { transform: rotate(45deg); color: var(--text-main); }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
        }
        
        .solde-card {
            background: linear-gradient(135deg, #1abc9c, #2ecc71);
            color: white;
        }
        .solde-card .montant { color: white; }

        /* Couleurs pastel plus soutenues et dynamiques */
        .tirelire-card { background-color: #ffe6d9; }
        .objectif-card { background-color: #dbeaff; }
        
        .montant { font-size: 2.2em; font-weight: 800; color: var(--text-main); text-align: center; margin: 10px 0; }
        
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.2em; display: flex; align-items: center; gap: 8px;}
        
        .progress-container {
            background: rgba(0, 0, 0, 0.08);
            border-radius: 10px;
            height: 14px;
            width: 100%;
            margin: 10px 0 5px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--blue);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #5d6a6b;
            margin-bottom: 15px;
        }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        
        button { 
            border: none; 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            font-size: 0.95em;
            white-space: nowrap;
        }
        button:active { transform: scale(0.95); }
        button.btn-retrait { background-color: var(--red); width: 100%; margin-top: 12px;}
        
        /* Boutons de la carte solde */
        .solde-actions { display: flex; gap: 10px; margin-top: 15px; }
        .solde-actions button { flex: 1; padding: 12px 10px; font-size: 0.9em; }
        button.btn-solde-action { background-color: rgba(255, 255, 255, 0.25); border: 1.5px solid white; }
        button.btn-solde-action:hover { background-color: rgba(255, 255, 255, 0.4); }
        
        .action-input { display: flex; gap: 8px; margin-top: 8px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #cbd5e1; 
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            background-color: white;
            color: var(--text-main);
        }
        input:focus { border-color: var(--text-main); }

        /* Structure de l'historique unifié */
        .liste-historique { max-height: 280px; overflow-y: auto; margin-top: 10px; }
        .hist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 11px 0;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        .hist-item:last-child { border-bottom: none; }
        .hist-desc { font-weight: 600; font-size: 0.95em; }
        .hist-date { font-size: 0.8em; color: #7f8c8d; margin-top: 2px; }
        .hist-montant { font-weight: 700; font-size: 1em; }
        .montant-plus { color: #27ae60; }
        .montant-moins { color: var(--red); }
        .vide { text-align: center; color: #95a5a6; font-size: 0.9em; padding: 15px 0; }

        /* Modales */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
        }
        .modal-content h2 { margin-top: 0; font-size: 1.4em; margin-bottom: 15px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9em; }
        .form-group input { width: 100%; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <!-- EN-TETE -->
        <div class="header">
            <h1>Mon Budget 💸</h1>
            <button class="btn-param" onclick="ouvrirParametres()">⚙️</button>
        </div>

        <!-- BLOC SOLDE -->
        <div class="card solde-card">
            <div style="text-align:center; font-weight: 600; opacity: 0.9;">Argent de poche disponible</div>
            <div class="montant" id="solde">0.00 €</div>
            
            <div class="solde-actions">
                <button class="btn-solde-action" onclick="ouvrirGain()">➕ Recevoir Argent</button>
                <button class="btn-solde-action" onclick="ouvrirDepense()">🛒 Enregistrer Achat</button>
            </div>
        </div>
        
        <!-- BLOC TIRELIRE -->
        <div class="card tirelire-card">
            <h3><span>🐷</span> Tirelire (Épargne)</h3>
            <div class="montant" id="tirelire">0.00 €</div>
            
            <div class="btn-grid">
                <button style="background:var(--orange)" onclick="transferer('tirelire', 1)">+ 1 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 5)">+ 5 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 10)">+ 10 €</button>
            </div>
            
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-tirelire" placeholder="Autre montant...">
                <button style="background:var(--orange); opacity: 0.9;" onclick="actionEpargnePerso('tirelire', 'input-tirelire')">OK</button>
            </div>
            <button class="btn-retrait" style="background: var(--orange)" onclick="ouvrirRetrait('tirelire')">Récupérer de l'argent ↩</button>
        </div>

        <!-- BLOC OBJECTIF -->
        <div class="card objectif-card">
            <h3 id="titre-objectif">🎯 Mon Objectif</h3>
            <div class="montant" id="obj-val">0.00 €</div>
            
            <div class="progress-container">
                <div class="progress-bar" id="barre-progression"></div>
            </div>
            <div class="progress-info">
                <span id="pourcentage-text">0%</span>
                <span id="obj-cible-text">sur 50.00 €</span>
            </div>

            <div class="btn-grid">
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 1)">+ 1 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 5)">+ 5 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 10)">+ 10 €</button>
            </div>

            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-objectif" placeholder="Autre montant...">
                <button style="background:var(--blue); opacity: 0.9;" onclick="actionEpargnePerso('objectif_courant', 'input-objectif')">OK</button>
            </div>
            <button class="btn-retrait" style="background: var(--blue)" onclick="ouvrirRetrait('objectif_courant')">Récupérer pour acheter ↩</button>
        </div>

        <!-- BLOC HISTORIQUE UNIQUE (ENTREES / SORTIES) -->
        <div class="card">
            <h3><span>📊</span> Mon Historique (Suivi)</h3>
            <div class="liste-historique" id="liste-historique"></div>
        </div>
    </div>

    <!-- MODAL RECEVOIR DE L'ARGENT (GAIN) -->
    <div class="modal" id="modal-gain">
        <div class="modal-content">
            <h2>➕ Recevoir de l'argent</h2>
            
            <div class="form-group">
                <label for="gain-montant">Montant reçu (€)</label>
                <input type="number" inputmode="decimal" id="gain-montant" placeholder="Ex: 10">
            </div>

            <div class="form-group">
                <label for="gain-desc">D'où vient cet argent ? (Provenance)</label>
                <input type="text" id="gain-desc" placeholder="Ex: Anniversaire, Tâche ménagère, Mamie...">
            </div>

            <div class="form-group">
                <label for="gain-date">Date de réception</label>
                <input type="date" id="gain-date">
            </div>

            <div class="modal-actions">
                <button style="background: #bdc3c7; color: #2d3436;" onclick="fermerGain()">Annuler</button>
                <button style="background: var(--primary); color: white;" onclick="enregistrerGain()">Ajouter au solde</button>
            </div>
        </div>
    </div>

    <!-- MODAL RECUPERER / RETRAIT -->
    <div class="modal" id="modal-retrait">
        <div class="modal-content">
            <h2 id="retrait-titre">↩ Récupérer de l'argent</h2>
            <div id="retrait-max" style="font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px;"></div>
            
            <div class="form-group">
                <label for="retrait-montant">Combien veux-tu récupérer ? (€)</label>
                <input type="number" inputmode="decimal" id="retrait-montant" placeholder="Ex: 5">
            </div>

            <div class="modal-actions">
                <button style="background: #bdc3c7; color: #2d3436;" onclick="fermerRetrait()">Annuler</button>
                <button style="background: var(--primary); color: white;" onclick="validerRetrait()">Confirmer</button>
            </div>
        </div>
    </div>

    <!-- MODAL ENREGISTRER UNE DEPENSE -->
    <div class="modal" id="modal-depense">
        <div class="modal-content">
            <h2>🛒 Nouvel Achat</h2>
            
            <div class="form-group">
                <label for="depense-montant">Montant de la dépense (€)</label>
                <input type="number" inputmode="decimal" id="depense-montant" placeholder="Ex: 4.50">
            </div>

            <div class="form-group">
                <label for="depense-desc">Qu'as-tu acheté ? (Description)</label>
                <input type="text" id="depense-desc" placeholder="Ex: Glace, Bande dessinée...">
            </div>

            <div class="form-group">
                <label for="depense-date">Date de l'achat</label>
                <input type="date" id="depense-date">
            </div>

            <div class="modal-actions">
                <button style="background: #bdc3c7; color: #2d3436;" onclick="fermerDepense()">Annuler</button>
                <button style="background: var(--red); color: white;" onclick="enregistrerDepense()">Valider l'achat</button>
            </div>
        </div>
    </div>

    <!-- MODAL PARAMETRES -->
    <div class="modal" id="modal-parametres">
        <div class="modal-content">
            <h2>⚙️ Réglages</h2>
            
            <div class="form-group">
                <label for="param-solde">Modifier le Solde actuel (€)</label>
                <input type="number" inputmode="decimal" id="param-solde">
            </div>

            <div class="form-group">
                <label for="param-nom-obj">Nom de l'objectif</label>
                <input type="text" id="param-nom-obj">
            </div>

            <div class="form-group">
                <label for="param-cible-obj">Montant de l'objectif à atteindre (€)</label>
                <input type="number" inputmode="decimal" id="param-cible-obj">
            </div>

            <div style="margin-top: 25px; padding-top: 15px; border-top: 2px dashed #eee;">
                <button style="background: var(--red); color: white; width: 100%;" onclick="reinitialiserTout()">⚠️ Tout Réinitialiser</button>
            </div>

            <div class="modal-actions" style="margin-top: 15px;">
                <button style="background: #bdc3c7; color: #2d3436;" onclick="fermerParametres()">Fermer</button>
                <button style="background: var(--primary); color: white;" onclick="enregistrerParametres()">Enregistrer</button>
            </div>
        </div>
    </div>
</body>
</html>
