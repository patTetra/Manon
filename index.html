<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Budget</title>
    <script>
        // Charger les données au démarrage
        let data = JSON.parse(localStorage.getItem('budgetData')) || { 
            solde: 0, 
            tirelire: 0, 
            objectif_courant: 0,
            nom_objectif: "Mon Objectif",
            cible_objectif: 50,
            dernier_mois_credit: "" 
        };

        // Compatibilité avec les anciennes sauvegardes
        if (!data.nom_objectif) data.nom_objectif = "Mon Objectif";
        if (!data.cible_objectif) data.cible_objectif = 50;
        if (!data.dernier_mois_credit) data.dernier_mois_credit = "";

        function sauvegarder() {
            localStorage.setItem('budgetData', JSON.stringify(data));
            afficher();
        }

        // Argent de poche automatique (15€ tous les 1er du mois)
        function verifierArgentDePoche() {
            const aujourdhui = new Date();
            const annee = aujourdhui.getFullYear();
            const mois = String(aujourdhui.getMonth() + 1).padStart(2, '0');
            const moisCourantStr = `${annee}-${mois}`;

            if (data.dernier_mois_credit !== moisCourantStr) {
                data.solde += 15;
                data.dernier_mois_credit = moisCourantStr;
                sauvegarder();
                
                setTimeout(() => {
                    alert("🎉 C'est le nouveau mois ! Tes 15 € d'argent de poche ont été ajoutés à ton solde !");
                }, 500);
            }
        }

        function afficher() {
            document.getElementById('solde').innerText = data.solde.toFixed(2) + " €";
            document.getElementById('tirelire').innerText = data.tirelire.toFixed(2) + " €";
            document.getElementById('obj-val').innerText = data.objectif_courant.toFixed(2) + " €";
            
            document.getElementById('titre-objectif').innerText = "🎯 " + data.nom_objectif;
            document.getElementById('obj-cible-text').innerText = "sur " + data.cible_objectif.toFixed(2) + " €";

            let pourcentage = 0;
            if (data.cible_objectif > 0) {
                pourcentage = (data.objectif_courant / data.cible_objectif) * 100;
                if (pourcentage > 100) pourcentage = 100;
            }
            document.getElementById('barre-progression').style.width = pourcentage + "%";
            document.getElementById('pourcentage-text').innerText = Math.round(pourcentage) + "%";

            // Pré-remplir les paramètres
            document.getElementById('param-solde').value = data.solde;
            document.getElementById('param-nom-obj').value = data.nom_objectif;
            document.getElementById('param-cible-obj').value = data.cible_objectif;
        }

        function ajouterSolde() {
            const input = document.getElementById('input-solde');
            const montant = parseFloat(input.value);
            if (!montant || montant <= 0) return;
            
            data.solde += montant;
            input.value = '';
            sauvegarder();
        }

        // Fonction générique pour transférer un montant fixe ou personnalisé
        function transferer(cible, montant) {
            const m = parseFloat(montant);
            if (!m || m <= 0) return;

            if (data.solde >= m) {
                data.solde -= m;
                data[cible] += m;
                sauvegarder();
            } else {
                alert("Solde insuffisant dans ton argent de poche !");
            }
        }

        // Action spécifique pour le bouton de validation du montant personnalisé
        function actionEpargnePerso(cible, inputId) {
            const input = document.getElementById(inputId);
            const montant = parseFloat(input.value);
            if (!montant || montant <= 0) return;

            if (data.solde >= montant) {
                data.solde -= montant;
                data[cible] += montant;
                input.value = ''; // Vide la case
                sauvegarder();
            } else {
                alert("Solde insuffisant dans ton argent de poche !");
            }
        }

        // Action de récupération (retrait)
        function recupererArgent(cible) {
            const montantDispo = data[cible];
            if (montantDispo <= 0) {
                alert("Il n'y a pas d'argent à récupérer ici !");
                return;
            }

            const saisie = prompt(`Combien veux-tu récupérer ? (Maximum disponible : ${montantDispo.toFixed(2)} €)`);
            const montant = parseFloat(saisie);
            
            if (!montant || montant <= 0) return;

            if (montant <= montantDispo) {
                data[cible] -= montant;
                data.solde += montant;
                sauvegarder();
            } else {
                alert("Tu ne peux pas récupérer plus que ce que tu as !");
            }
        }

        // Paramètres
        function ouvrirParametres() { document.getElementById('modal-parametres').style.display = 'flex'; }
        function fermerParametres() { document.getElementById('modal-parametres').style.display = 'none'; }

        function enregistrerParametres() {
            const nvSolde = parseFloat(document.getElementById('param-solde').value);
            const nvNom = document.getElementById('param-nom-obj').value.trim();
            const nvCible = parseFloat(document.getElementById('param-cible-obj').value);

            if (!isNaN(nvSolde)) data.solde = nvSolde;
            if (nvNom) data.nom_objectif = nvNom;
            if (!isNaN(nvCible) && nvCible >= 0) data.cible_objectif = nvCible;

            sauvegarder();
            fermerParametres();
        }

        window.onload = function() {
            afficher();
            verifierArgentDePoche();
        };
    </script>
    <style>
        :root {
            --bg-color: #f7f9fa;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --primary: #2ecc71;
            --orange: #e67e22;
            --blue: #3498db;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); 
            padding: 15px; 
            margin: 0;
            color: var(--text-main);
        }
        
        .container { max-width: 450px; margin: 0 auto; position: relative; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }
        .header h1 { font-size: 1.5em; margin: 0; font-weight: 700; }
        .btn-param {
            background: none;
            border: none;
            font-size: 1.6em;
            cursor: pointer;
            padding: 5px;
            color: #7f8c8d;
            transition: transform 0.3s;
        }
        .btn-param:hover { transform: rotate(45deg); color: var(--text-main); }

        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 24px; 
            margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04); 
        }
        
        .solde-card {
            background: linear-gradient(135deg, #1abc9c, #2ecc71);
            color: white;
        }
        .solde-card .montant { color: white; }
        
        .montant { font-size: 2.2em; font-weight: 800; color: var(--text-main); text-align: center; margin: 10px 0; }
        
        h3 { margin-top: 0; margin-bottom: 5px; font-size: 1.2em; display: flex; align-items: center; gap: 8px;}
        
        .progress-container {
            background: #eee;
            border-radius: 10px;
            height: 14px;
            width: 100%;
            margin: 10px 0 5px 0;
            overflow: hidden;
        }
        .progress-bar {
            background: var(--blue);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-out;
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 10px 0; }
        
        button { 
            border: none; 
            padding: 12px 15px; 
            border-radius: 12px; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            font-size: 0.95em;
            white-space: nowrap;
        }
        button:active { transform: scale(0.95); }
        button.btn-retrait { background-color: #e74c3c; width: 100%; margin-top: 12px;}
        
        .action-input { display: flex; gap: 8px; margin-top: 8px; }
        input { 
            flex: 1; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            min-width: 0;
        }
        input:focus { border-color: var(--primary); }
        .btn-add { background: var(--text-main); }

        /* Modale */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
        }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
        }
        .modal-content h2 { margin-top: 0; font-size: 1.4em; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9em; }
        .form-group input { width: 100%; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions button { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <!-- EN-TETE -->
        <div class="header">
            <h1>Mon Budget 💸</h1>
            <button class="btn-param" onclick="ouvrirParametres()">⚙️</button>
        </div>

        <!-- BLOC SOLDE -->
        <div class="card solde-card">
            <div style="text-align:center; font-weight: 600; opacity: 0.9;">Argent de poche disponible</div>
            <div class="montant" id="solde">0.00 €</div>
            
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-solde" placeholder="Ajouter de l'argent (Ex: 10)">
                <button class="btn-add" onclick="ajouterSolde()">+ Ajouter</button>
            </div>
        </div>
        
        <!-- BLOC TIRELIRE -->
        <div class="card">
            <h3><span>🐷</span> Tirelire (Épargne)</h3>
            <div class="montant" id="tirelire">0.00 €</div>
            
            <!-- Boutons prédéfinis -->
            <div class="btn-grid">
                <button style="background:var(--orange)" onclick="transferer('tirelire', 1)">+ 1 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 5)">+ 5 €</button>
                <button style="background:var(--orange)" onclick="transferer('tirelire', 10)">+ 10 €</button>
            </div>
            
            <!-- Saisie personnalisée numérique -->
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-tirelire" placeholder="Autre montant...">
                <button style="background:var(--orange); opacity: 0.9;" onclick="actionEpargnePerso('tirelire', 'input-tirelire')">OK</button>
            </div>
            <button class="btn-retrait" onclick="recupererArgent('tirelire')">Récupérer de l'argent ↩</button>
        </div>

        <!-- BLOC OBJECTIF -->
        <div class="card">
            <h3 id="titre-objectif">🎯 Mon Objectif</h3>
            <div class="montant" id="obj-val">0.00 €</div>
            
            <!-- Barre de progression -->
            <div class="progress-container">
                <div class="progress-bar" id="barre-progression"></div>
            </div>
            <div class="progress-info">
                <span id="pourcentage-text">0%</span>
                <span id="obj-cible-text">sur 50.00 €</span>
            </div>

            <!-- Boutons prédéfinis -->
            <div class="btn-grid">
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 1)">+ 1 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 5)">+ 5 €</button>
                <button style="background:var(--blue)" onclick="transferer('objectif_courant', 10)">+ 10 €</button>
            </div>

            <!-- Saisie personnalisée numérique -->
            <div class="action-input">
                <input type="number" inputmode="decimal" id="input-objectif" placeholder="Autre montant...">
                <button style="background:var(--blue); opacity: 0.9;" onclick="actionEpargnePerso('objectif_courant', 'input-objectif')">OK</button>
            </div>
            <button class="btn-retrait" onclick="recupererArgent('objectif_courant')">Récupérer pour acheter ↩</button>
        </div>
    </div>

    <!-- MODAL PARAMETRES -->
    <div class="modal" id="modal-parametres">
        <div class="modal-content">
            <h2>⚙️ Réglages</h2>
            
            <div class="form-group">
                <label for="param-solde">Modifier le Solde actuel (€)</label>
                <input type="number" inputmode="decimal" id="param-solde">
            </div>

            <div class="form-group">
                <label for="param-nom-obj">Nom de l'objectif</label>
                <input type="text" id="param-nom-obj">
            </div>

            <div class="form-group">
                <label for="param-cible-obj">Montant de l'objectif à atteindre (€)</label>
                <input type="number" inputmode="decimal" id="param-cible-obj">
            </div>

            <div class="modal-actions">
                <button style="background: #bdc3c7; color: #2d3436;" onclick="fermerParametres()">Annuler</button>
                <button style="background: var(--primary); color: white;" onclick="enregistrerParametres()">Enregistrer</button>
            </div>
        </div>
    </div>
</body>
</html>
